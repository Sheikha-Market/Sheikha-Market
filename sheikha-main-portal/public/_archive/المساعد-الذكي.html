<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي | منظومة شيخة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/elite-design-system.css">
    <style>
        :root {
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --bg-tertiary: #1e293b;
            --bg-elevated: #0c1220;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border-primary: #334155;
            --border-secondary: #1e293b;
            --sheikha-gold-500: #d4af37;
            --saudi-green-500: #006c35;
            --ai-purple: #8b5cf6;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            padding: 12px 24px;
            background: rgba(2,6,23,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .logo-mark {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--sheikha-gold-500), #b8942f);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: #000;
        }
        
        .logo-text {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--sheikha-gold-500);
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .ai-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(139,92,246,0.15);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--ai-purple);
        }
        
        .ai-badge-dot {
            width: 8px;
            height: 8px;
            background: var(--ai-purple);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .back-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            border-color: var(--sheikha-gold-500);
            color: var(--sheikha-gold-500);
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        
        .welcome-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--ai-purple), #6d28d9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            margin-bottom: 32px;
            box-shadow: 0 0 80px rgba(139,92,246,0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .welcome-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .welcome-title span {
            background: linear-gradient(135deg, var(--ai-purple), var(--sheikha-gold-500));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 500px;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        
        /* Quick Questions */
        .quick-questions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 600px;
            width: 100%;
        }
        
        .quick-question {
            padding: 16px 20px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-secondary);
            border-radius: 14px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-align: right;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .quick-question:hover {
            border-color: var(--ai-purple);
            color: var(--text-primary);
            transform: translateY(-2px);
        }
        
        .quick-question-icon {
            font-size: 1.25rem;
        }
        
        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: none;
        }
        
        .chat-messages.active {
            display: block;
        }
        
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .message.bot .message-avatar {
            background: linear-gradient(135deg, var(--ai-purple), #6d28d9);
        }
        
        .message.user .message-avatar {
            background: var(--sheikha-gold-500);
        }
        
        .message-content {
            max-width: 70%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.7;
        }
        
        .message.bot .message-content {
            background: var(--bg-elevated);
            border: 1px solid var(--border-secondary);
            border-top-right-radius: 4px;
        }
        
        .message.user .message-content {
            background: var(--ai-purple);
            color: #fff;
            border-top-left-radius: 4px;
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* Input Area */
        .input-area {
            padding: 20px 0;
            border-top: 1px solid var(--border-secondary);
        }
        
        .input-container {
            display: flex;
            gap: 12px;
            background: var(--bg-elevated);
            border: 2px solid var(--border-secondary);
            border-radius: 16px;
            padding: 8px;
            transition: all 0.3s;
        }
        
        .input-container:focus-within {
            border-color: var(--ai-purple);
            box-shadow: 0 0 0 4px rgba(139,92,246,0.1);
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            max-height: 150px;
        }
        
        .chat-input::placeholder {
            color: var(--text-muted);
        }
        
        .chat-input:focus {
            outline: none;
        }
        
        .send-btn {
            width: 48px;
            height: 48px;
            background: var(--ai-purple);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:hover {
            background: #7c3aed;
            transform: scale(1.05);
        }
        
        .send-btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }
        
        /* Suggestions */
        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .suggestion-chip {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-secondary);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .suggestion-chip:hover {
            border-color: var(--ai-purple);
            color: var(--ai-purple);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-title { display: none; }
            .quick-questions { grid-template-columns: 1fr; }
            .message-content { max-width: 85%; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="منظومة-شيخة.html" class="logo-link">
            <div class="logo-mark">ش</div>
            <span class="logo-text">شيخة</span>
        </a>
        
        <div class="header-title">
            <span style="font-weight: 700;">المساعد الذكي</span>
            <div class="ai-badge">
                <span class="ai-badge-dot"></span>
                <span>متصل</span>
            </div>
        </div>
        
        <a href="منظومة-شيخة.html" class="back-btn">
            <span>←</span>
            <span>العودة</span>
        </a>
    </header>
    
    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">🤖</div>
            <h1 class="welcome-title">مرحباً، أنا <span>مساعد شيخة</span></h1>
            <p class="welcome-subtitle">
                أنا هنا لمساعدتك في كل ما يتعلق بمنظومة شيخة للمعادن.
                اسألني عن السوق، سلسلة التوريد، اللوجستيات، أو أي شيء آخر!
            </p>
            
            <div class="quick-questions">
                <button class="quick-question" onclick="askQuestion('كيف أبدأ التجارة في منظومة شيخة؟')">
                    <span class="quick-question-icon">🏪</span>
                    <span>كيف أبدأ التجارة؟</span>
                </button>
                <button class="quick-question" onclick="askQuestion('ما هي أنواع المعادن المتاحة في السوق؟')">
                    <span class="quick-question-icon">⚙️</span>
                    <span>أنواع المعادن المتاحة</span>
                </button>
                <button class="quick-question" onclick="askQuestion('كيف تعمل سلسلة التوريد؟')">
                    <span class="quick-question-icon">⛓️</span>
                    <span>كيف تعمل سلسلة التوريد؟</span>
                </button>
                <button class="quick-question" onclick="askQuestion('ما هي خدمات الشحن والنقل؟')">
                    <span class="quick-question-icon">🚚</span>
                    <span>خدمات الشحن والنقل</span>
                </button>
                <button class="quick-question" onclick="askQuestion('هل المنظومة ملتزمة بالشريعة الإسلامية؟')">
                    <span class="quick-question-icon">☪️</span>
                    <span>الالتزام الشرعي</span>
                </button>
                <button class="quick-question" onclick="askQuestion('كيف أتتبع شحنتي؟')">
                    <span class="quick-question-icon">📍</span>
                    <span>تتبع الشحنات</span>
                </button>
            </div>
        </div>
        
        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages"></div>
        
        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <textarea 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="اكتب سؤالك هنا..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    ➤
                </button>
            </div>
            
            <div class="suggestions" id="suggestions">
                <button class="suggestion-chip" onclick="askQuestion('ما الفرق بين المعادن الأساسية والثمينة؟')">المعادن الأساسية vs الثمينة</button>
                <button class="suggestion-chip" onclick="askQuestion('كيف أسجل كتاجر؟')">التسجيل كتاجر</button>
                <button class="suggestion-chip" onclick="askQuestion('ما هي طرق الدفع المتاحة؟')">طرق الدفع</button>
            </div>
        </div>
    </div>
    
    <script>
        // Knowledge Base
        const KNOWLEDGE = {
            'بدء التجارة': `
                للبدء في التجارة عبر منظومة شيخة، اتبع هذه الخطوات:

                1️⃣ **إنشاء حساب**: سجل حسابك من خلال صفحة "تسجيل تاجر"
                2️⃣ **التحقق**: أكمل عملية التحقق من الهوية والسجل التجاري
                3️⃣ **إعداد المتجر**: أضف معلومات متجرك والمنتجات
                4️⃣ **البدء**: ابدأ في البيع والشراء!

                📌 جميع المعاملات ملتزمة بالشريعة الإسلامية ولا يوجد ربا أو غرر.
            `,
            'أنواع المعادن': `
                نقدم 4 فئات رئيسية من المعادن:

                🔩 **المعادن الأساسية**: حديد، نحاس، ألومنيوم، زنك، رصاص
                💎 **المعادن الثمينة**: ذهب، فضة، بلاتين، بلاديوم
                ⚛️ **المعادن النادرة**: نيوديميوم، ديسبروسيوم، سكانديوم
                ♻️ **السكراب**: خردة معدنية مختلفة قابلة لإعادة التدوير

                جميع المعادن موثقة بشهادات جودة ومصدر معتمدة.
            `,
            'سلسلة التوريد': `
                سلسلة التوريد في شيخة تمر بـ 6 مراحل:

                1️⃣ **المصدر**: المناجم ومحلات السكراب
                2️⃣ **التجميع**: فرز وتصنيف المواد
                3️⃣ **النقل**: شحن آمن مع تتبع GPS
                4️⃣ **الصهر**: تنقية وتكرير في مصاهر معتمدة
                5️⃣ **التصنيع**: تحويل لمنتجات نهائية
                6️⃣ **المستخدم**: توصيل للعملاء

                🔍 تتبع شفاف 100% لكل مرحلة!
            `,
            'الشحن والنقل': `
                خدمات لوجستية متكاملة:

                🚚 **أنواع الشاحنات**:
                • مسطحة (30 طن)
                • مغلقة (20 طن)
                • قلاب للسكراب (25 طن)
                • مصفحة للمعادن الثمينة (5 طن)

                📍 **المميزات**:
                • تتبع GPS مباشر
                • حماية وتوثيق
                • توصيل لجميع مناطق المملكة
                • خدمة عملاء 24/7
            `,
            'الشريعة الإسلامية': `
                ☪️ نعم! منظومة شيخة ملتزمة 100% بالشريعة الإسلامية:

                ✅ **ما نلتزم به**:
                • العدل والإنصاف في كل المعاملات
                • الصدق والأمانة في البيع والشراء
                • الوفاء بالعقود والعهود
                • معلومية المبيع والثمن
                • التراضي بين الطرفين

                🚫 **ما نتجنبه**:
                • الربا بجميع صوره
                • الغرر والجهالة
                • الغش والتدليس
                • الاحتكار

                📖 مرجعنا: الكتاب والسنة
            `,
            'تتبع الشحنة': `
                لتتبع شحنتك:

                1️⃣ انتقل إلى صفحة "اللوجستيات"
                2️⃣ أدخل رقم الشحنة (مثال: SHK-2026-123456)
                3️⃣ اضغط "تتبع"

                ستحصل على:
                📍 موقع الشحنة الحالي
                🕐 الوقت المتوقع للوصول
                📋 تاريخ الحركة الكامل
                📱 تنبيهات فورية

                يمكنك أيضاً تتبع الشحنة من لوحة التحكم الخاصة بك.
            `,
            'التسجيل كتاجر': `
                خطوات التسجيل كتاجر:

                1️⃣ انتقل إلى صفحة "تسجيل تاجر"
                2️⃣ أدخل بياناتك الشخصية
                3️⃣ ارفق المستندات المطلوبة:
                   • الهوية الوطنية/الإقامة
                   • السجل التجاري
                   • شهادة الزكاة والدخل
                4️⃣ انتظر التحقق (1-2 يوم عمل)
                5️⃣ ابدأ التجارة!

                📌 التسجيل مجاني ولا توجد رسوم خفية.
            `,
            'طرق الدفع': `
                طرق الدفع المتاحة:

                💳 **إلكترونية**:
                • بطاقات مدى
                • بطاقات الائتمان (Visa, MasterCard)
                • Apple Pay / STC Pay
                • التحويل البنكي

                🏦 **تقليدية**:
                • الدفع عند الاستلام
                • شيكات مصدقة

                ⚠️ جميع طرق الدفع خالية من الربا ومتوافقة مع الشريعة.
            `,
            'default': `
                شكراً لسؤالك! أنا هنا لمساعدتك.

                يمكنني مساعدتك في:
                🏪 التجارة والبيع والشراء
                ⚙️ أنواع المعادن والمواصفات
                ⛓️ سلسلة التوريد
                🚚 الشحن والنقل واللوجستيات
                ☪️ الالتزام الشرعي
                💳 الدفع والمعاملات المالية

                اسألني سؤالاً محدداً وسأساعدك!
            `
        };
        
        let chatStarted = false;
        
        function findAnswer(question) {
            const q = question.toLowerCase();
            
            if (q.includes('بدأ') || q.includes('تجارة') || q.includes('بداية')) {
                return KNOWLEDGE['بدء التجارة'];
            }
            if (q.includes('معادن') || q.includes('أنواع') || q.includes('متاح')) {
                return KNOWLEDGE['أنواع المعادن'];
            }
            if (q.includes('سلسلة') || q.includes('توريد')) {
                return KNOWLEDGE['سلسلة التوريد'];
            }
            if (q.includes('شحن') || q.includes('نقل') || q.includes('لوجستي')) {
                return KNOWLEDGE['الشحن والنقل'];
            }
            if (q.includes('شريعة') || q.includes('إسلام') || q.includes('حلال') || q.includes('ربا')) {
                return KNOWLEDGE['الشريعة الإسلامية'];
            }
            if (q.includes('تتبع') || q.includes('شحنة') || q.includes('أين')) {
                return KNOWLEDGE['تتبع الشحنة'];
            }
            if (q.includes('تسجيل') || q.includes('تاجر') || q.includes('حساب')) {
                return KNOWLEDGE['التسجيل كتاجر'];
            }
            if (q.includes('دفع') || q.includes('مال') || q.includes('بطاقة')) {
                return KNOWLEDGE['طرق الدفع'];
            }
            
            return KNOWLEDGE['default'];
        }
        
        function addMessage(text, type) {
            const messagesDiv = document.getElementById('chatMessages');
            const avatar = type === 'bot' ? '🤖' : '👤';
            
            const messageHTML = `
                <div class="message ${type}">
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-content">${text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>
                </div>
            `;
            
            messagesDiv.innerHTML += messageHTML;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTyping() {
            const messagesDiv = document.getElementById('chatMessages');
            const typingHTML = `
                <div class="message bot" id="typingIndicator">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content typing-indicator">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                    </div>
                </div>
            `;
            messagesDiv.innerHTML += typingHTML;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        function startChat() {
            if (!chatStarted) {
                document.getElementById('welcomeScreen').style.display = 'none';
                document.getElementById('chatMessages').classList.add('active');
                chatStarted = true;
            }
        }
        
        function askQuestion(question) {
            startChat();
            addMessage(question, 'user');
            
            showTyping();
            
            setTimeout(() => {
                hideTyping();
                const answer = findAnswer(question);
                addMessage(answer, 'bot');
            }, 1000 + Math.random() * 1000);
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            input.value = '';
            input.style.height = 'auto';
            
            askQuestion(text);
        }
        
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        // Auto-resize textarea
        document.getElementById('chatInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
