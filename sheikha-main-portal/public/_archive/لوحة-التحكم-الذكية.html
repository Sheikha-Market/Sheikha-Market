<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | منظومة شيخة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/elite-design-system.css">
    <style>
        :root {
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --bg-tertiary: #1e293b;
            --bg-elevated: #0c1220;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --border-primary: #334155;
            --border-secondary: #1e293b;
            --sheikha-gold-500: #d4af37;
            --saudi-green-500: #006c35;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        /* Layout */
        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-secondary);
            padding: 24px 16px;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 12px 24px;
            border-bottom: 1px solid var(--border-secondary);
            margin-bottom: 24px;
            text-decoration: none;
        }
        
        .sidebar-logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--sheikha-gold-500), #b8942f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 900;
            color: #000;
        }
        
        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--sheikha-gold-500);
        }
        
        .sidebar-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        
        /* User Switcher */
        .user-switcher {
            background: var(--bg-elevated);
            border: 1px solid var(--border-secondary);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 24px;
        }
        
        .user-switcher-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .user-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
        }
        
        /* Nav Sections */
        .nav-section {
            margin-bottom: 24px;
        }
        
        .nav-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0 12px;
            margin-bottom: 8px;
        }
        
        .nav-list {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 4px;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.2s;
        }
        
        .nav-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .nav-link.active {
            background: rgba(212,175,55,0.1);
            color: var(--sheikha-gold-500);
        }
        
        .nav-link-icon {
            font-size: 1.25rem;
        }
        
        .nav-link-badge {
            margin-right: auto;
            padding: 2px 8px;
            background: var(--sheikha-gold-500);
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #000;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 24px;
        }
        
        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 1.75rem;
            font-weight: 800;
        }
        
        .top-actions {
            display: flex;
            gap: 12px;
        }
        
        .top-btn {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-secondary);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .top-btn:hover {
            border-color: var(--sheikha-gold-500);
            color: var(--sheikha-gold-500);
        }
        
        .top-btn-primary {
            background: var(--sheikha-gold-500);
            border-color: var(--sheikha-gold-500);
            color: #000;
        }
        
        .top-btn-primary:hover {
            background: #b8942f;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-secondary);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            border-color: var(--sheikha-gold-500);
            transform: translateY(-2px);
        }
        
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .stat-icon.gold { background: rgba(212,175,55,0.15); }
        .stat-icon.green { background: rgba(0,108,53,0.15); }
        .stat-icon.blue { background: rgba(59,130,246,0.15); }
        .stat-icon.purple { background: rgba(139,92,246,0.15); }
        
        .stat-trend {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
        }
        
        .trend-up {
            background: rgba(16,185,129,0.15);
            color: #10b981;
        }
        
        .trend-down {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        /* Modules Grid */
        .modules-section {
            margin-bottom: 32px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .module-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-secondary);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        
        .module-card:hover {
            border-color: var(--sheikha-gold-500);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .module-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 16px;
        }
        
        .module-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .module-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        
        .quick-action {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-secondary);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .quick-action:hover {
            border-color: var(--sheikha-gold-500);
            color: var(--sheikha-gold-500);
            background: rgba(212,175,55,0.05);
        }
        
        /* Recent Activity */
        .activity-section {
            background: var(--bg-elevated);
            border: 1px solid var(--border-secondary);
            border-radius: 16px;
            padding: 24px;
        }
        
        .activity-list {
            list-style: none;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-secondary);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-icon {
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .activity-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .activity-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .modules-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
            }
            .main-content {
                margin-right: 0;
            }
            .stats-grid { grid-template-columns: 1fr; }
            .modules-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

            <!-- Quick Actions -->

            <!-- Modules -->

                <div class="modules-grid" id="modulesGrid">

            <!-- Recent Activity -->

                </div>
                <ul class="activity-list" id="activityList">
                    <!-- Dynamic activity -->
                </ul>
            </section>
        </main>
    </div>

        // Render Functions
        function renderStats(stats) {
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon ${stat.iconClass}">${stat.icon}</div>
                        <span class="stat-trend ${stat.trendUp ? 'trend-up' : 'trend-down'}">${stat.trend}</span>
                    </div>
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }
        
        function renderQuickActions(actions) {
            const container = document.getElementById('quickActions');
            container.innerHTML = actions.map(action => `
                <a href="${action.href}" class="quick-action">
                    <span>${action.icon}</span>
                    <span>${action.text}</span>
                </a>
            `).join('');
        }
        
        function renderModules(modules) {
            const grid = document.getElementById('modulesGrid');
            grid.innerHTML = modules.map(module => `
                <a href="#" class="module-card">
                    <div class="module-icon" style="background: ${module.iconBg}">${module.icon}</div>
                    <h3 class="module-title">${module.title}</h3>
                    <p class="module-description">${module.desc}</p>
                </a>
            `).join('');
        }
        
        function renderNavigation(sections) {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = sections.map(section => `
                <div class="nav-section">
                    <div class="nav-section-title">${section.title}</div>
                    <ul class="nav-list">
                        ${section.items.map(item => `
                            <li class="nav-item">
                                <a href="#" class="nav-link ${item.active ? 'active' : ''}">
                                    <span class="nav-link-icon">${item.icon}</span>
                                    <span>${item.text}</span>
                                    ${item.badge ? `<span class="nav-link-badge">${item.badge}</span>` : ''}
                                </a>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }
        
        function renderActivities() {
            const list = document.getElementById('activityList');
            list.innerHTML = ACTIVITIES.map(activity => `
                <li class="activity-item">
                    <div class="activity-icon">${activity.icon}</div>
                    <div class="activity-content">
                        <div class="activity-title">${activity.title}</div>
                        <div class="activity-meta">${activity.meta}</div>
                    </div>
                    <div class="activity-time">${activity.time}</div>
                </li>
            `).join('');
        }
        
        function switchUserType(type) {
            const config = USER_TYPES[type];
            
            document.getElementById('pageTitle').textContent = config.title;
            document.getElementById('mainAction').innerHTML = `<span>+</span><span>${config.mainAction}</span>`;
            
            renderStats(config.stats);
            renderQuickActions(config.quickActions);
            renderModules(config.modules);
            renderNavigation(config.navSections);
        }
        
        // Initialize
        switchUserType('trader');
        renderActivities();
    </script>
</body>
