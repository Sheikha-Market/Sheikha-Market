<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="سوق شيخة العالمي للمعادن والمعادن الثمينة والسكراب - المسعر الأساسي العادل في السعودية والعالم الإسلامي">
    <title>السوق | منظومة شيخة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a5c36;
            --primary-dark: #063d24;
            --gold: #d4af37;
            --gold-light: #f0d060;
            --gold-dark: #aa8c2c;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --dark: #0a0f1a;
            --darker: #050810;
            --card: #0d1424;
            --card-hover: #111b2e;
            --text: #ffffff;
            --text-muted: #94a3b8;
            --text-faint: #64748b;
            --border: #1e3a5f;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow: 0 4px 24px rgba(0,0,0,0.25);
            --shadow-gold: 0 4px 20px rgba(212,175,55,0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
        }

        /* Header */
        .header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
        }
        .nav {
            display: flex;
            gap: 8px;
        }
        .nav-link {
            padding: 10px 18px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: var(--radius);
            transition: var(--transition);
        }
        .nav-link:hover, .nav-link.active {
            color: var(--gold);
            background: rgba(212,175,55,0.1);
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .lang-switcher {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: var(--radius);
        }
        .lang-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
        }
        .lang-btn.active {
            background: var(--gold);
            color: var(--dark);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            color: var(--dark);
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .btn-success {
            background: var(--success);
            color: white;
        }

        /* Hero */
        .hero {
            padding: 48px 32px;
            background: linear-gradient(180deg, var(--card) 0%, var(--dark) 100%);
            text-align: center;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(212,175,55,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .hero-content {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
        }
        .hero-title {
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            font-weight: 900;
            margin-bottom: 12px;
        }
        .hero-title span { color: var(--gold); }
        .hero-desc {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Market Tabs */
        .market-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .market-tab {
            padding: 14px 32px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .market-tab:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .market-tab.active {
            background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(10,92,54,0.15));
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: var(--shadow-gold);
        }
        .market-tab-icon {
            font-size: 1.3rem;
        }

        /* Main Layout */
        .main-layout {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px 32px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
        }

        /* Sidebar - HS Code Tree */
        .sidebar {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* HS Code Tree */
        .hs-tree {
            list-style: none;
        }
        .hs-chapter {
            margin-bottom: 8px;
        }
        .hs-chapter-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
        }
        .hs-chapter-header:hover {
            border-color: var(--gold);
            background: rgba(212,175,55,0.05);
        }
        .hs-chapter-header.active {
            border-color: var(--gold);
            background: rgba(212,175,55,0.1);
        }
        .hs-chapter-icon {
            font-size: 1.2rem;
        }
        .hs-chapter-info {
            flex: 1;
        }
        .hs-chapter-code {
            font-size: 0.7rem;
            color: var(--gold);
            font-family: monospace;
            font-weight: 700;
        }
        .hs-chapter-name {
            font-size: 0.85rem;
            font-weight: 600;
        }
        .hs-chapter-arrow {
            color: var(--text-muted);
            transition: var(--transition);
        }
        .hs-chapter-header.expanded .hs-chapter-arrow {
            transform: rotate(90deg);
        }
        
        .hs-headings {
            list-style: none;
            padding-right: 16px;
            margin-top: 4px;
            display: none;
        }
        .hs-headings.show {
            display: block;
        }
        .hs-heading {
            padding: 8px 12px;
            margin: 2px 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hs-heading:hover {
            background: rgba(212,175,55,0.05);
            color: var(--gold);
        }
        .hs-heading.active {
            background: rgba(212,175,55,0.1);
            color: var(--gold);
        }
        .hs-heading-code {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text-faint);
        }

        /* Main Content */
        .main-content {
            min-height: 500px;
        }

        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title span { color: var(--gold); }
        .section-badge {
            padding: 4px 12px;
            background: rgba(212,175,55,0.1);
            color: var(--gold);
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: monospace;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .breadcrumb a {
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }
        .breadcrumb a:hover {
            color: var(--gold);
        }
        .breadcrumb-sep {
            color: var(--text-faint);
        }
        .breadcrumb-current {
            color: var(--gold);
            font-weight: 600;
        }

        /* Subcategories Grid */
        .subcategories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }
        .subcat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .subcat-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .subcat-card.active {
            border-color: var(--gold);
            background: rgba(212,175,55,0.05);
        }
        .subcat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(10,92,54,0.1));
        }
        .subcat-info {
            flex: 1;
        }
        .subcat-name {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .subcat-hs {
            font-size: 0.7rem;
            color: var(--text-faint);
            font-family: monospace;
        }
        .subcat-count {
            font-size: 0.75rem;
            color: var(--gold);
        }

        /* Products Grid */
        .products-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 8px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            min-width: 120px;
        }
        .search-input {
            padding: 8px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            width: 200px;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }
        .product-card:hover {
            border-color: rgba(212,175,55,0.5);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        .product-image {
            height: 140px;
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(10,92,54,0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            position: relative;
        }
        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
        }
        .badge-metals { background: rgba(113,121,126,0.3); color: #c0c0c0; }
        .badge-scrap { background: rgba(16,185,129,0.2); color: var(--success); }
        .badge-precious { background: rgba(212,175,55,0.2); color: var(--gold); }
        .product-content {
            padding: 16px;
        }
        .product-category {
            font-size: 0.7rem;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 6px;
        }
        .product-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .product-specs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .spec-item {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .product-price {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .product-price small {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .seller-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .seller-avatar {
            width: 28px;
            height: 28px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .seller-name {
            font-size: 0.8rem;
            font-weight: 600;
        }
        .seller-location {
            font-size: 0.65rem;
            color: var(--text-faint);
        }
        .contact-btn {
            padding: 6px 14px;
            background: var(--primary);
            border: none;
            border-radius: var(--radius);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .contact-btn:hover {
            background: var(--primary-dark);
        }

        /* Supply Chain Section */
        .supply-chain-section {
            margin-top: 32px;
            padding: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
        }
        .supply-chain-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-lg);
            margin: 16px 0;
            overflow-x: auto;
            gap: 8px;
        }
        .chain-stage {
            text-align: center;
            min-width: 90px;
            padding: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .chain-stage:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }
        .stage-icon { font-size: 1.5rem; margin-bottom: 6px; }
        .stage-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 2px; }
        .stage-desc { font-size: 0.65rem; color: var(--text-muted); }
        .chain-arrow { font-size: 1.2rem; color: var(--gold); flex-shrink: 0; }

        /* Containers Section */
        .containers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .container-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            transition: var(--transition);
        }
        .container-card:hover {
            border-color: var(--success);
            transform: translateY(-2px);
        }
        .container-icon { font-size: 2rem; margin-bottom: 8px; }
        .container-card h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
        .container-specs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .container-specs span {
            padding: 2px 8px;
            background: rgba(16,185,129,0.1);
            color: var(--success);
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .container-card p { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 12px; }

        /* Logistics Grid */
        .logistics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .logistics-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }
        .logistics-card:hover { border-color: var(--gold); }
        .logistics-icon { font-size: 1.8rem; margin-bottom: 10px; }
        .logistics-card h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; }
        .logistics-card ul { list-style: none; margin-bottom: 12px; }
        .logistics-card li { padding: 4px 0; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logistics-card li:last-child { border-bottom: none; }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { position: static; max-height: none; }
        }
        @media (max-width: 768px) {
            .nav { display: none; }
            .header { padding: 12px 16px; }
            .hero { padding: 32px 16px; }
            .main-layout { padding: 16px; }
            .market-tabs { gap: 8px; }
            .market-tab { padding: 10px 20px; font-size: 0.9rem; }
            .supply-chain-flow { flex-wrap: wrap; justify-content: center; }
            .chain-arrow { display: none; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 60 60" width="100%" height="100%">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#f7e98e"/>
                                <stop offset="50%" style="stop-color:#d4af37"/>
                                <stop offset="100%" style="stop-color:#aa8c2c"/>
                            </linearGradient>
                        </defs>
                        <circle cx="30" cy="30" r="27" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
                        <path d="M30 12 L38 24 L32 24 L32 32 L28 32 L28 24 L22 24 Z" fill="url(#logoGrad)" transform="rotate(0 30 30)"/>
                        <path d="M30 12 L38 24 L32 24 L32 32 L28 32 L28 24 L22 24 Z" fill="url(#logoGrad)" transform="rotate(120 30 30)"/>
                        <path d="M30 12 L38 24 L32 24 L32 32 L28 32 L28 24 L22 24 Z" fill="url(#logoGrad)" transform="rotate(240 30 30)"/>
                        <circle cx="30" cy="30" r="6" fill="url(#logoGrad)"/>
                    </svg>
                </div>
                <span class="logo-text">سوق شيخة</span>
            </a>
            <nav class="nav">
                <a href="/" class="nav-link">🏠 الرئيسية</a>
                <a href="السوق.html" class="nav-link active">🛒 السوق</a>
                <a href="الاقسام.html" class="nav-link">🗂️ الأقسام</a>
                <a href="نظام-شيخة-الذكي.html" class="nav-link">🔗 سلسلة التوريد</a>
                <a href="مساعد-شيخة.html" class="nav-link">🤖 المساعد</a>
                <a href="app.html" class="nav-link">📱 التطبيق</a>
            </nav>
            <div class="header-actions">
                <div class="lang-switcher">
                    <button class="lang-btn active" onclick="setLanguage('ar')">عربي</button>
                    <button class="lang-btn" onclick="setLanguage('en')">EN</button>
                </div>
                <a href="عرض-بضائع.html" class="btn btn-gold">عرض بضاعة</a>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">سوق <span>المعادن والسكراب</span></h1>

        function setViewMode(mode) {
            currentViewMode = mode;
            
            // تحديث أزرار الوضع
            document.getElementById('viewCategory').classList.toggle('active', mode === 'category');
            document.getElementById('viewStage').classList.toggle('active', mode === 'stage');
            
            // إظهار/إخفاء التبويبات المناسبة
            document.getElementById('categoryTabs').style.display = mode === 'category' ? 'flex' : 'none';
            document.getElementById('stageTabs').style.display = mode === 'stage' ? 'flex' : 'none';
            
            // تحديث الشريط الجانبي
            if (mode === 'stage') {
                renderStageSidebar();
            } else {
                renderSidebar();
            }
            
            renderMainContent();
        }
        
        function switchStage(stage) {
            currentStage = stage;
            
            // Update tabs
            document.querySelectorAll('#stageTabs .market-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-stage="${stage}"]`).classList.add('active');
            
            renderStageSidebar();
            renderMainContent();
        }

            const sidebar = document.getElementById('sidebar');

            document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));

            // Render sidebar and content

            renderMainContent();

        function renderSidebar() {
            const data = HS_DATABASE[currentMarket];
            const tree = document.getElementById('hsTree');
            
            let html = '';
            for (const [code, chapter] of Object.entries(data.chapters)) {
                const isExpanded = currentChapter === code;
                html += `
                    <li class="hs-chapter">
                        <div class="hs-chapter-header ${isExpanded ? 'expanded active' : ''}" onclick="toggleChapter('${code}')">
                            <span class="hs-chapter-icon">${chapter.icon}</span>
                            <div class="hs-chapter-info">
                                <div class="hs-chapter-code">HS ${chapter.code}</div>
                                <div class="hs-chapter-name">${chapter.name}</div>
                            </div>
                            <span class="hs-chapter-arrow">›</span>
                        </div>
                        <ul class="hs-headings ${isExpanded ? 'show' : ''}" id="headings-${code}">
                            ${Object.entries(chapter.headings).map(([hcode, heading]) => `
                                <li class="hs-heading ${currentHeading === hcode ? 'active' : ''}" onclick="selectHeading('${code}', '${hcode}')">
                                    <span class="hs-heading-code">${hcode}</span>
                                    <span>${heading.name}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </li>
                `;
            }
            tree.innerHTML = html;
        }

        function toggleChapter(code) {
            if (currentChapter === code) {
                currentChapter = null;
            } else {
                currentChapter = code;
            }
            currentHeading = null;
            renderSidebar();
            renderMainContent();
        }

        function selectHeading(chapterCode, headingCode) {
            currentChapter = chapterCode;
            currentHeading = headingCode;
            renderSidebar();
            renderMainContent();
        }

        function renderMainContent() {
            const titleEl = document.getElementById('sectionTitle');
            const badgeEl = document.getElementById('sectionBadge');
            const breadcrumbCurrent = document.getElementById('currentSection');
            const grid = document.getElementById('subcategoriesGrid');
            
            // عرض حسب مرحلة سلسلة التوريد
            if (currentViewMode === 'stage') {
                renderStageContent(titleEl, badgeEl, breadcrumbCurrent, grid);
                return;
            }
            
            // العرض العادي حسب الفئة
            const data = HS_DATABASE[currentMarket];
            
            if (currentChapter && currentHeading) {
                // Show specific heading
                const chapter = data.chapters[currentChapter];
                const heading = chapter.headings[currentHeading];
                
                titleEl.innerHTML = `${chapter.icon} <span>${heading.name}</span>`;
                badgeEl.textContent = `HS ${currentHeading}`;
                breadcrumbCurrent.textContent = heading.name;
                
                // Show products for this heading
                grid.innerHTML = `<p style="color: var(--text-muted);">عرض المنتجات المتاحة في التصنيف: ${heading.name} (${heading.products || 0} منتج)</p>`;
                
            } else if (currentChapter) {
                // Show chapter headings
                const chapter = data.chapters[currentChapter];
                
                titleEl.innerHTML = `${chapter.icon} <span>${chapter.name}</span>`;
                badgeEl.textContent = `HS ${chapter.code}`;
                breadcrumbCurrent.textContent = chapter.name;
                
                grid.innerHTML = Object.entries(chapter.headings).map(([code, heading]) => `
                    <div class="subcat-card" onclick="selectHeading('${currentChapter}', '${code}')">
                        <div class="subcat-icon">${chapter.icon}</div>
                        <div class="subcat-info">
                            <div class="subcat-name">${heading.name}</div>
                            <div class="subcat-hs">HS ${code}</div>
                            <div class="subcat-count">${heading.products || 0} منتج</div>
                        </div>
                    </div>
                `).join('');
                
            } else {
                // Show all chapters
                titleEl.innerHTML = `${data.icon} <span>${data.name}</span>`;
                badgeEl.textContent = data.hsRange;
                breadcrumbCurrent.textContent = data.name;
                
                grid.innerHTML = Object.entries(data.chapters).map(([code, chapter]) => `
                    <div class="subcat-card" onclick="toggleChapter('${code}')">
                        <div class="subcat-icon">${chapter.icon}</div>
                        <div class="subcat-info">
                            <div class="subcat-name">${chapter.name}</div>
                            <div class="subcat-hs">HS ${chapter.code}</div>
                            <div class="subcat-count">${Object.keys(chapter.headings).length} تصنيف فرعي</div>

                    <div style="background: rgba(0,0,0,0.2); border-radius: 12px; padding: 16px; margin-bottom: 20px;">
                        <div style="font-weight: 700; margin-bottom: 8px;">📦 ${productName || 'المنتج'}</div>
                        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-muted);">

                            <span>المتوفر: ${availableQty || '—'} ${unit}</span>
                        </div>
                    </div>
                    
                    <form id="purchaseForm" style="display: grid; gap: 16px;">

                            <label style="display: block; margin-bottom: 6px; font-size: 0.9rem;">الكمية المطلوبة (${unit})</label>

                        </div>
                        
                        <div id="purchaseTotalBox" style="background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3); border-radius: 12px; padding: 16px; text-align: center; display: none;">
                            <div style="font-size: 0.85rem; color: var(--text-muted);">الإجمالي المقدر</div>
                            <div id="purchaseTotal" style="font-size: 1.5rem; font-weight: 900; color: var(--gold);">—</div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <div>
                                <label style="display: block; margin-bottom: 6px; font-size: 0.85rem;">طريقة الاستلام</label>
                                <select id="deliveryMethod" class="filter-select" style="width: 100%;">

                                    <option value="delivery">توصيل</option>
                                </select>

                                    <option value="escrow">ضمان شيخة (آمن)</option>
                                    <option value="direct">دفع مباشر</option>
                                    <option value="credit">آجل (بموافقة)</option>
                                </select>
                            </div>
                        </div>
                        
                        <div style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); border-radius: 10px; padding: 12px; font-size: 0.8rem; color: var(--success);">
                            🔒 <strong>ضمان شيخة:</strong> يُحفظ المبلغ في حساب آمن حتى تستلم البضاعة وتؤكد
                        </div>
                        
                        <button type="submit" class="btn btn-gold" style="width: 100%; padding: 16px; font-size: 1rem;">
                            ✓ تأكيد الطلب
                        </button>
                        
                        <button type="button" class="btn btn-outline" style="width: 100%;" onclick="contactSeller('', '${productId}', '${productName}')">
                            💬 تواصل مع التاجر أولاً
                        </button>
                    </form>
                </div>
            `);
            
            document.getElementById('purchaseForm')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const qty = document.getElementById('purchaseQty').value;
                const total = Number(qty) * Number(price);
                alert('تم إرسال طلب الشراء!\\n\\nالمنتج: ${productName}\\nالكمية: ' + qty + ' ${unit}\\nالإجمالي: ' + total.toLocaleString() + ' ${currency}\\n\\nسيتواصل معك التاجر لتأكيد الطلب.');
                closeModal();
            });
        }
        
        // تحديث إجمالي الشراء
        function updatePurchaseTotal(price, currency) {
            const qty = document.getElementById('purchaseQty')?.value || 0;
            const totalBox = document.getElementById('purchaseTotalBox');
            const totalEl = document.getElementById('purchaseTotal');
            if (qty > 0 && price > 0) {
                const total = Number(qty) * Number(price);
                totalEl.textContent = total.toLocaleString() + ' ' + currency;
                totalBox.style.display = 'block';
            } else {
                totalBox.style.display = 'none';
            }
        }
        
        // دوال مساعدة للنوافذ
        function showModal(content) {
            let modal = document.getElementById('smartModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'smartModal';
                modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;';
                modal.onclick = (e) => { if (e.target === modal) closeModal(); };
                document.body.appendChild(modal);
            }
            modal.innerHTML = `
                <div style="background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-xl); max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative;">
                    <button onclick="closeModal()" style="position: absolute; top: 16px; left: 16px; background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;">×</button>
                    ${content}
                </div>
            `;
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            const modal = document.getElementById('smartModal');
            if (modal) modal.style.display = 'none';
        }
