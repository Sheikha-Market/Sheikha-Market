<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل | شيخة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', -apple-system, sans-serif;
            background: linear-gradient(135deg, #050810, #0d1424);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 400px; }
        .icon {
            font-size: 5rem;
            margin-bottom: 24px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 16px;
            color: #d4af37;
        }
        p {
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.7;
        }
        .btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #f0d060, #d4af37);
            border: none;
            border-radius: 12px;
            color: #050810;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>أنت غير متصل بالإنترنت</h1>
        <p>يبدو أنك فقدت الاتصال بالإنترنت. تحقق من اتصالك وحاول مرة أخرى.</p>
        <button class="btn" onclick="location.reload()">🔄 إعادة المحاولة</button>
    </div>
</body>
</html>
