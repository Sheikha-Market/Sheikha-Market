<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الذكية | منظومة شيخة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f0d060;
            --green: #0a5c36;
            --green-saudi: #006c35;
            --dark: #0a0f1a;
            --darker: #050810;
            --card: #0d1424;
            --card-hover: #111b2e;
            --text: #fff;
            --text-muted: #94a3b8;
            --border: #1e3a5f;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #8b5cf6;
            --radius: 12px;
            --radius-lg: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--darker); color: var(--text); min-height: 100vh; }
        
        /* Dashboard Layout */
        .dashboard { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-logo {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 900; color: var(--dark);
        }
        .sidebar-brand h2 { font-size: 1.1rem; color: var(--gold); }
        .sidebar-brand p { font-size: 0.75rem; color: var(--text-muted); }
        
        /* User Type Selector */
        .user-type-selector {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }
        .user-type-selector label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 8px; }
        .user-type-select {
            width: 100%;
            padding: 12px;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .user-type-select:focus { outline: none; border-color: var(--gold); }
        
        /* Sidebar Nav */
        .sidebar-nav {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: var(--radius);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 4px;
            cursor: pointer;
        }
        .nav-item:hover { background: rgba(212,175,55,0.1); color: var(--gold); }
        .nav-item.active { background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(10,92,54,0.15)); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
        .nav-item-icon { font-size: 1.2rem; }
        .nav-item-badge {
            margin-right: auto;
            padding: 2px 8px;
            background: var(--gold);
            color: var(--dark);
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .nav-item[data-restricted="true"] { opacity: 0.4; pointer-events: none; }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-right: 280px;
        }
        
        /* Top Bar */
        .topbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar-title { font-size: 1.3rem; font-weight: 800; }
        .topbar-title span { color: var(--gold); }
        .topbar-actions { display: flex; gap: 12px; align-items: center; }
        .topbar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--dark);
            border-radius: var(--radius);
        }
        .user-avatar {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--gold), var(--green));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
        }
        .user-info h4 { font-size: 0.85rem; }
        .user-info p { font-size: 0.7rem; color: var(--text-muted); }
        
        /* Dashboard Content */
        .dashboard-content { padding: 24px; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: all 0.3s;
        }
        .stat-card:hover { border-color: var(--gold); transform: translateY(-4px); }
        .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .stat-icon {
            width: 50px; height: 50px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .stat-change { font-size: 0.8rem; padding: 4px 8px; border-radius: 6px; }
        .stat-change.up { background: rgba(16,185,129,0.15); color: var(--success); }
        .stat-change.down { background: rgba(239,68,68,0.15); color: var(--danger); }
        .stat-value { font-size: 2rem; font-weight: 900; margin-bottom: 4px; }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); }
        
        /* Module Grid */
        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title span { color: var(--gold); }
        
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .module-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }
        .module-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .module-card[data-restricted="true"] { opacity: 0.4; pointer-events: none; }
        .module-icon {
            width: 60px; height: 60px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            margin-bottom: 16px;
        }
        .module-card h3 { font-size: 1.1rem; margin-bottom: 8px; }
        .module-card p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }
        .module-features { display: flex; flex-wrap: wrap; gap: 8px; }
        .module-feature {
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* User Type Badges */
        .user-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .badge-admin { background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
        .badge-trader { background: rgba(212,175,55,0.15); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
        .badge-factory { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
        .badge-logistics { background: rgba(59,130,246,0.15); color: var(--info); border: 1px solid rgba(59,130,246,0.3); }
        .badge-buyer { background: rgba(6,182,212,0.15); color: #06b6d4; border: 1px solid rgba(6,182,212,0.3); }
        
        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        .quick-action {
            padding: 12px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .quick-action:hover { border-color: var(--gold); color: var(--gold); }
        .quick-action.primary { background: linear-gradient(135deg, var(--gold-light), var(--gold)); color: var(--dark); border: none; }
        
        /* Activity Feed */
        .activity-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
        }
        .activity-item {
            display: flex;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .activity-content { flex: 1; }
        .activity-content h4 { font-size: 0.9rem; margin-bottom: 4px; }
        .activity-content p { font-size: 0.8rem; color: var(--text-muted); }
        .activity-time { font-size: 0.75rem; color: var(--text-muted); }
        
        /* Responsive */
        @media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .modules-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; }
            .stats-grid { grid-template-columns: 1fr; }
            .modules-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        function switchUserType(type) {
            currentUserType = type;
            const userType = USER_TYPES[type];
            
            // Update badge
            const badge = document.getElementById('userTypeBadge');
            badge.className = 'user-type-badge ' + userType.badgeClass;
            badge.innerHTML = `${userType.icon} ${userType.name}`;
            
            // Render all sections
            renderSidebar();
            renderStats();
            renderQuickActions();
            renderModules();
            renderActivity();
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            const sections = NAV_SECTIONS[currentUserType];
            
            let html = '';
            sections.forEach(section => {
                html += `<div class="nav-section">
                    <div class="nav-section-title">${section.title}</div>`;
                section.items.forEach(itemId => {
                    const module = MODULES[itemId];
                    if (module) {
                        const isRestricted = !module.users.includes(currentUserType);
                        html += `<a href="${module.link}" class="nav-item" data-restricted="${isRestricted}">
                            <span class="nav-item-icon">${module.icon}</span>
                            <span>${module.name}</span>
                        </a>`;
                    }
                });
                html += '</div>';
            });
            nav.innerHTML = html;
        }

        function renderStats() {
            const grid = document.getElementById('statsGrid');
            const stats = STATS[currentUserType];
            
            grid.innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon" style="background: ${stat.color}20;">${stat.icon}</div>
                        <span class="stat-change ${stat.up ? 'up' : 'down'}">${stat.change}</span>
                    </div>
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                </div>
            `).join('');
        }

                    <span>${action.icon}</span>
                    <span>${action.label}</span>
                </a>
            `).join('');

        function renderModules() {
            const grid = document.getElementById('modulesGrid');
            const sections = NAV_SECTIONS[currentUserType];
            const moduleIds = sections.flatMap(s => s.items);
            const uniqueModules = [...new Set(moduleIds)];
            
            grid.innerHTML = uniqueModules.slice(0, 6).map(id => {
                const m = MODULES[id];
                if (!m) return '';
                const isRestricted = !m.users.includes(currentUserType);
                return `
                    <a href="${m.link}" class="module-card" data-restricted="${isRestricted}">
                        <div class="module-icon" style="background: ${m.color}20;">${m.icon}</div>
                        <h3>${m.name}</h3>
                        <p>${m.desc}</p>
                        <div class="module-features">
                            ${m.features.map(f => `<span class="module-feature">${f}</span>`).join('')}

                    </a>
                `;
            }).join('');
        }
