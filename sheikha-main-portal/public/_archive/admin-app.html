<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-title" content="شيخة — أدمن">
    <link rel="manifest" href="/manifest.json">
    <title>تطبيق الأدمن — شيخة | Admin App — Sheikha</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card: #151515; --green: #006633; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; padding: 1.5rem; }
        .header { text-align: center; margin-bottom: 2rem; padding: 1.5rem; border-bottom: 2px solid var(--gold); }
        .header h1 { color: var(--gold); font-size: 1.75rem; }
        .header p { color: #888; margin-top: 0.5rem; font-size: 0.95rem; }
        .section { margin-bottom: 2rem; }
        .section h2 { color: var(--gold); font-size: 1.2rem; margin-bottom: 1rem; }
        .links { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .link-card {
            background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 1.25rem;
            display: block; color: inherit; text-decoration: none; transition: all 0.2s;
        }
        .link-card:hover { border-color: var(--gold); box-shadow: 0 4px 20px rgba(212,175,55,0.2); }
        .link-card .icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .link-card .name { font-weight: 700; color: #fff; margin-bottom: 0.25rem; }
        .link-card .desc { font-size: 0.85rem; color: #888; }
        .back { display: inline-block; margin-bottom: 1rem; color: var(--gold); text-decoration: none; font-weight: 500; }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="index.html" class="back">← الرئيسية</a>
    <div class="header">
        <h1>🛡️ تطبيق الأدمن</h1>
        <p>بوابة موحدة لإدارة المنظومة — لوحات التحكم والأنظمة الإدارية حسب صلاحيات الأدمن</p>
    </div>
    <div class="section">
        <h2>لوحات التحكم</h2>
        <div class="links" id="adminLinks"></div>
    </div>
    <div class="section">
        <h2>الأنظمة الإدارية</h2>
        <div class="links" id="adminSystems"></div>
    </div>
    <script>
        const DASHBOARD_PORT = 35000;
        const ADMIN_LINKS = [
            { name: 'داشبورد شبكة شيخة (أدمن)', desc: 'تسويق، تخزين، مبيعات، سلاسل إمداد، تحليل، صلاحيات كاملة', url: `http://localhost:${DASHBOARD_PORT}`, role: 'admin', icon: '📊' },
            { name: 'لوحة التحكم الرئيسية', desc: 'التحكم المركزي', url: 'http://localhost:3000', icon: '🎛️' }
        ];
        const ADMIN_SYSTEMS = [
            { name: 'نظام الإدارة المتكامل', desc: 'نماذج أعمال، إجراءات، نماذج إدارية، توثيق، أرشيف', url: 'http://localhost:47600', icon: '📋' },
            { name: 'المدفوعات والمحاسبة والاعتمادات', desc: 'مدفوعات، محاسبة، اعتمادات وضمانات بنكية حلال', url: 'http://localhost:47700', icon: '💰' },
            { name: 'رفيق العميل', desc: 'إدارة خدمة العملاء — تذاكر، استفسارات، رضا', url: 'http://localhost:47800', icon: '🤝' },
            { name: 'إدارة علاقات العملاء (CRM)', desc: 'جهات اتصال، صفقات، أنشطة', url: 'http://localhost:47810', icon: '📋' },
            { name: 'سوق السكراب المتكامل', desc: 'عروض، طلبات، أسعار', url: 'http://localhost:33000', icon: '🏪' },
            { name: 'العقود والاتفاقيات', desc: 'عقود، اتفاقيات، شراكات', url: 'http://localhost:46200', icon: '📄' },
            { name: 'المشتريات والمبيعات', desc: 'مشتريات، مبيعات', url: 'http://localhost:46300', icon: '📦' },
            { name: 'التسعير الذكي', desc: 'أسعار، سعر شيخة المرجعي', url: 'http://localhost:46400', icon: '📈' }
        ];
        function render() {
            const base = window.location.port === '8080' ? '' : 'http://localhost:8080';
            document.getElementById('adminLinks').innerHTML = ADMIN_LINKS.map(l => {
                const href = l.role ? `${l.url}?role=${l.role}` : l.url;
                return `<a class="link-card" href="${href}" target="_blank"><span class="icon">${l.icon}</span><div class="name">${l.name}</div><div class="desc">${l.desc}</div></a>`;
            }).join('');
            document.getElementById('adminSystems').innerHTML = ADMIN_SYSTEMS.map(l =>
                `<a class="link-card" href="${l.url}" target="_blank"><span class="icon">${l.icon}</span><div class="name">${l.name}</div><div class="desc">${l.desc}</div></a>`
            ).join('');
        }
        render();
    </script>
    <footer style="text-align:center;padding:1.5rem;color:#8a9a8a;font-size:0.9em;border-top:1px solid #2a352a;">
        <a href="index.html" style="color:#d4af37;">الرئيسية</a> · <a href="خريطة-الموقع.html" style="color:#d4af37;">خريطة الموقع</a> · <a href="ريادة-الأعمال.html" style="color:#d4af37;">ريادة الأعمال</a> · <a href="https://wa.me/966554942904" target="_blank" rel="noopener" style="color:#d4af37;">واتساب +966 55 494 2904</a>
        <p style="margin-top:0.5rem;font-size:0.85em;">أهداف الموقع: بلا ضرر ولا ضرار · حب العلامة وأمان · محافظة على البيئة والصحة والبشر.</p>
    </footer>
</body>
</html>
