    <rect x="85" y="85" width="230" height="230" rx="4" fill="url(#g2)" opacity=".04" transform="rotate(0 200 200)"/>
    <rect x="85" y="85" width="230" height="230" rx="4" stroke="url(#g2)" stroke-width="1.2" fill="none" opacity=".18" transform="rotate(0 200 200)"/>
    <rect x="85" y="85" width="230" height="230" rx="4" fill="url(#g2)" opacity=".03" transform="rotate(45 200 200)"/>
