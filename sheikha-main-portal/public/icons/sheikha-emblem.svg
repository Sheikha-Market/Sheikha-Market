    <circle cx="200" cy="10" r="5" fill="url(#g2v)" filter="url(#gl)" opacity=".45"/>
    <circle cx="200" cy="390" r="4.5" fill="url(#g2)" opacity=".28"/>
    <circle cx="10" cy="200" r="4.5" fill="url(#g2)" opacity=".28"/>
    <circle cx="390" cy="200" r="4.5" fill="url(#g2)" opacity=".28"/>
    <circle cx="56" cy="56" r="3" fill="url(#g2)" opacity=".16"/>
    <circle cx="344" cy="56" r="3" fill="url(#g2)" opacity=".16"/>
    <circle cx="56" cy="344" r="3" fill="url(#g2)" opacity=".16"/>
    <circle cx="344" cy="344" r="3" fill="url(#g2)" opacity=".16"/>

    <!-- النص -->
    <text x="200" y="375" font-family="'Cairo','Tajawal',sans-serif" font-size="20" fill="url(#g2)" text-anchor="middle" opacity=".35" font-weight="900" letter-spacing="6">شيخة</text>
    <text x="200" y="393" font-family="'Outfit','Cairo',sans-serif" font-size="8" fill="url(#g2)" text-anchor="middle" opacity=".15" font-weight="700" letter-spacing="4">SHEIKHA</text>
</svg>
