    <polygon points="200,128 234,200 200,272 166,200" fill="rgba(212,175,55,.06)" stroke="url(#g2)" stroke-width="2" opacity=".45"/>
    <line x1="200" y1="128" x2="166" y2="200" stroke="url(#g2)" stroke-width=".8" opacity=".15"/>
    <line x1="200" y1="128" x2="234" y2="200" stroke="url(#g2)" stroke-width=".8" opacity=".15"/>
    <line x1="200" y1="272" x2="166" y2="200" stroke="url(#g2)" stroke-width=".6" opacity=".1"/>
    <line x1="200" y1="272" x2="234" y2="200" stroke="url(#g2)" stroke-width=".6" opacity=".1"/>
