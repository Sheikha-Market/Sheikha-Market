    <line x1="108" y1="162" x2="96" y2="224" stroke="url(#g2)" stroke-width="1.8" opacity=".5"/>
    <line x1="155" y1="162" x2="167" y2="224" stroke="url(#g2)" stroke-width="1.8" opacity=".5"/>
    <line x1="131" y1="162" x2="131" y2="218" stroke="url(#g2)" stroke-width=".6" opacity=".15" stroke-dasharray="2 3"/>
    <path d="M88,224 C95,252 131,260 131,260 C131,260 167,252 174,224 Z" fill="rgba(212,175,55,.08)" stroke="url(#g2)" stroke-width="2" opacity=".55"/>
