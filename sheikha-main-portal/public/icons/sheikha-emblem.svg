    <circle cx="200" cy="68" r="18" fill="url(#crownCore)" filter="url(#glBig)" opacity=".92"/>
    <circle cx="200" cy="68" r="10" fill="#080d18" opacity=".35"/>
    <circle cx="200" cy="68" r="5.5" fill="url(#gemCore)" opacity=".75"/>
    <circle cx="196" cy="64" r="2" fill="#fff" opacity=".3"/>
