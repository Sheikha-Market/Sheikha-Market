    <circle cx="200" cy="161" r="9" fill="url(#g2v)" opacity=".6"/>
    <circle cx="200" cy="161" r="5" fill="#080d18" opacity=".25"/>
    <circle cx="200" cy="161" r="2.5" fill="url(#gemCore)" opacity=".4"/>

