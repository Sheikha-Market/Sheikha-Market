<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="g2" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#FBF0C8"/>
            <stop offset="25%" stop-color="#E8C94A"/>
            <stop offset="55%" stop-color="#D4AF37"/>
            <stop offset="100%" stop-color="#A8882B"/>
        </linearGradient>
        <linearGradient id="g2v" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#FBF0C8"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>
        <linearGradient id="gArm" x1="0%" y1="50%" x2="100%" y2="50%">
            <stop offset="0%" stop-color="#A8882B"/>
            <stop offset="50%" stop-color="#F5E6A3"/>
            <stop offset="100%" stop-color="#A8882B"/>
        </linearGradient>
        <linearGradient id="gPillar" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" stop-color="#F5E6A3"/>
            <stop offset="40%" stop-color="#D4AF37"/>
            <stop offset="100%" stop-color="#A8882B"/>
        </linearGradient>
        <radialGradient id="g2r" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#F5E6A3" stop-opacity=".18"/>
            <stop offset="40%" stop-color="#D4AF37" stop-opacity=".08"/>
            <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="gemCore" cx="45%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#FFFDE8"/>
            <stop offset="35%" stop-color="#F5E6A3"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </radialGradient>
        <radialGradient id="crownCore" cx="50%" cy="35%" r="50%">
            <stop offset="0%" stop-color="#FFFDE8"/>
            <stop offset="40%" stop-color="#F5E6A3"/>
            <stop offset="100%" stop-color="#E8C94A"/>
        </radialGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glBig"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>

    <!-- خلفية -->
    <rect width="400" height="400" rx="20" fill="#030509"/>

    <!-- الهالة الخارجية -->
    <circle cx="200" cy="200" r="198" fill="url(#g2r)"/>
    <circle cx="200" cy="200" r="190" stroke="url(#g2)" stroke-width=".5" fill="none" opacity=".08" stroke-dasharray="3 8"/>

    <!-- الدوائر الزخرفية -->
    <circle cx="200" cy="200" r="182" stroke="url(#g2)" stroke-width="1.8" fill="none" opacity=".22"/>
    <circle cx="200" cy="200" r="178" stroke="url(#g2)" stroke-width=".4" fill="none" opacity=".08" stroke-dasharray="1 4"/>

