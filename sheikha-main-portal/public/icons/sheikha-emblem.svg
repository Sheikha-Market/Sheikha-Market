    <rect x="156" y="322" width="88" height="7" rx="3.5" fill="url(#g2)" opacity=".55"/>
    <rect x="175" y="324" width="50" height="2" rx="1" fill="#FBF0C8" opacity=".1"/>
    <rect x="142" y="333" width="116" height="6" rx="3" fill="url(#g2)" opacity=".35"/>
    <line x1="168" y1="329" x2="154" y2="339" stroke="url(#g2)" stroke-width="2" opacity=".3"/>
    <line x1="232" y1="329" x2="246" y2="339" stroke="url(#g2)" stroke-width="2" opacity=".3"/>

