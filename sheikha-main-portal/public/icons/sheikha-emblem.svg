    <line x1="269" y1="162" x2="269" y2="218" stroke="url(#g2)" stroke-width=".6" opacity=".15" stroke-dasharray="2 3"/>
    <path d="M226,224 C233,252 269,260 269,260 C269,260 305,252 312,224 Z" fill="rgba(212,175,55,.08)" stroke="url(#g2)" stroke-width="2" opacity=".55"/>
    <path d="M238,230 C246,246 269,252 269,252 C269,252 292,246 300,230" stroke="url(#g2)" stroke-width=".7" fill="none" opacity=".2"/>
    <circle cx="245" cy="162" r="2.5" fill="url(#g2)" opacity=".35"/>
