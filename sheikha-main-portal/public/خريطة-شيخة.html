<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#D4AF37;--gold-l:#F5E6A3;--dark:#030509;--card:#0a0e18;--border:rgba(212,175,55,.1);--text:#f4f4f5;--muted:#94a3b8;--green:#10b981;--blue:#3b82f6;--orange:#f59e0b;--red:#ef4444;--purple:#a855f7;--copper:#B87333}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 10%,rgba(212,175,55,.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.wrap{max-width:1300px;margin:0 auto;padding:20px;position:relative;z-index:1}

/* Header */
.hdr{text-align:center;padding:40px 20px 20px}
.hdr h1{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .ayah{color:var(--gold);font-size:.95rem;font-style:italic;margin:12px 0 4px;opacity:.85}
.hdr .ref{color:var(--muted);font-size:.8rem}
.hdr .sub{color:var(--muted);font-size:.9rem;margin-top:10px}

/* Stats Bar */
.stats{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:20px 0 30px}
.st{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 22px;text-align:center;min-width:120px}
.st .n{font-size:1.8rem;font-weight:900;color:var(--gold)}
.st .l{color:var(--muted);font-size:.75rem;margin-top:2px}

/* Nav Tabs */
.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:0 0 24px;position:sticky;top:0;z-index:50;background:rgba(3,5,9,.92);backdrop-filter:blur(20px);padding:14px 0;border-bottom:1px solid var(--border)}
.tab{padding:8px 20px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal';font-size:.85rem;font-weight:600;cursor:pointer;transition:all .3s}
.tab:hover{color:var(--gold);border-color:var(--gold)}
.tab.active{background:linear-gradient(135deg,var(--gold),var(--copper));color:var(--dark);border-color:transparent;font-weight:800}

/* Section */
.section{margin-bottom:36px;display:none}
.section.show{display:block}
.section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.section-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.section-info h2{font-size:1.2rem;font-weight:800}
.section-info p{font-size:.8rem;color:var(--muted)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .3s;text-decoration:none;color:var(--text);display:block;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;border-radius:16px 16px 0 0}
.card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 40px rgba(212,175,55,.08)}
.card .badge{position:absolute;top:14px;left:14px;padding:3px 12px;border-radius:20px;font-size:.7rem;font-weight:700}
.badge.live{background:rgba(16,185,129,.15);color:var(--green)}
.badge.soon{background:rgba(245,158,11,.15);color:var(--orange)}
.badge.plan{background:rgba(168,85,247,.15);color:var(--purple)}
.card .ic{font-size:2rem;margin-bottom:10px}
.card h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.card .en{display:none}
.card .desc{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:10px}
.card .meta{display:flex;flex-wrap:wrap;gap:6px}
.card .tag{padding:2px 8px;border-radius:6px;font-size:.65rem;background:rgba(59,130,246,.1);color:var(--blue)}

/* Phase Timeline */
.timeline{display:flex;gap:0;margin:20px 0;overflow-x:auto;padding-bottom:8px}
.phase{flex:1;min-width:180px;text-align:center;padding:16px 12px;border:1px solid var(--border);background:var(--card);position:relative}
.phase:first-child{border-radius:0 12px 12px 0}
.phase:last-child{border-radius:12px 0 0 12px}
.phase .ph-num{font-size:1.6rem;font-weight:900;color:var(--gold)}
.phase .ph-name{font-size:.85rem;font-weight:700;margin:4px 0}
.phase .ph-time{font-size:.7rem;color:var(--muted)}
.phase.current{border-color:var(--gold);background:rgba(212,175,55,.05)}
.phase.current::after{content:'الآن';position:absolute;top:-10px;right:50%;transform:translateX(50%);background:var(--gold);color:var(--dark);padding:2px 10px;border-radius:10px;font-size:.65rem;font-weight:800}

/* Back to Home */
.home-btn{position:fixed;bottom:20px;left:20px;background:linear-gradient(135deg,var(--gold),var(--copper));color:var(--dark);border:none;padding:12px 22px;border-radius:12px;font-family:'Tajawal';font-weight:800;font-size:.85rem;cursor:pointer;z-index:100;box-shadow:0 4px 20px rgba(212,175,55,.3);text-decoration:none;display:flex;align-items:center;gap:8px}
.home-btn:hover{transform:scale(1.05)}

.footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:30px}
.footer .owner{color:var(--gold);font-weight:700;font-size:.9rem;margin-bottom:6px}

@media(max-width:768px){.hdr h1{font-size:1.6rem}.grid{grid-template-columns:1fr}.stats{gap:6px}.st{min-width:90px;padding:10px}.st .n{font-size:1.3rem}.tab{padding:6px 14px;font-size:.78rem}}
</style>
</head>

            { name:'التجارة الدولية', en:'International Trade', icon:'🌍', status:'plan', desc:'استيراد وتصدير — معاهدات دولية', tags:['تجارة'] },
            { name:'العلوم والابتكار', en:'Sciences', icon:'🔬', status:'plan', desc:'بحث علمي — مختبرات — 14 مجال', tags:['علوم'] }
        ]
    }
];

const PHASES = [
    { num:1, name:'التأسيس', en:'Foundation', time:'الآن', current:true },
    { num:2, name:'التشغيل التجريبي', en:'Pilot', time:'المرحلة الحالية', current:true },
    { num:3, name:'الإطلاق التجاري', en:'Launch', time:'بعد التحقق', current:false },
    { num:4, name:'التوسع الإقليمي', en:'Regional', time:'السنة الثانية', current:false },
    { num:5, name:'العالمية', en:'Global', time:'السنة الثالثة+', current:false }
];

// ═══════════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════════
const totalCards = SECTIONS.reduce((s,sec) => s + sec.cards.length, 0);
const liveCards = SECTIONS.reduce((s,sec) => s + sec.cards.filter(c => c.status === 'live').length, 0);
const planCards = totalCards - liveCards;

document.getElementById('mainStats').innerHTML = [
    { n: SECTIONS.length, l:'قسم رئيسي' },
    { n: totalCards, l:'سوق / منظومة' },
    { n: liveCards, l:'نشط الآن' },
    { n: planCards, l:'قيد التخطيط' },
    { n: '10', l:'قانون شرعي' },
    { n: '42', l:'شرط وضابط' }
].map(s => `<div class="st"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join('');

// Timeline
document.getElementById('timeline').innerHTML = PHASES.map(p =>
    `<div class="phase${p.current?' current':''}">
        <div class="ph-num">${p.num}</div>
        <div class="ph-name">${p.name}</div>
        <div style="font-size:.7rem;color:var(--blue)">${p.en}</div>
        <div class="ph-time">${p.time}</div>
    </div>`
).join('');

// Tabs
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');

tabsEl.innerHTML = `<button class="tab active" data-id="all">الكل</button>` +
    SECTIONS.map(s => `<button class="tab" data-id="${s.id}">${s.icon} ${s.tab}</button>`).join('');

function renderSections(filter) {
    const show = filter === 'all' ? SECTIONS : SECTIONS.filter(s => s.id === filter);
    contentEl.innerHTML = show.map(sec => `
        <div class="section show">
            <div class="section-hdr">
                <div class="section-icon" style="background:${sec.color}20;color:${sec.color}">${sec.icon}</div>
                <div class="section-info">
                    <h2>${sec.title}</h2>
                    <p>${sec.desc}</p>
                </div>
            </div>
            <div class="grid">
                ${sec.cards.map(c => {
                    const statusClass = c.status === 'live' ? 'live' : c.status === 'soon' ? 'soon' : 'plan';
                    const statusText = c.status === 'live' ? 'نشط' : c.status === 'soon' ? 'قريباً' : 'مخطط';
                    const href = c.url ? `href="${c.url}"` : '';
                    return `<a ${href} class="card" style="--accent:${sec.color}">
                        <div style="position:absolute;top:0;right:0;left:0;height:3px;background:${sec.color};border-radius:16px 16px 0 0"></div>
                        <span class="badge ${statusClass}">${statusText}</span>
                        <div class="ic">${c.icon}</div>
                        <h3>${c.name}</h3>
                        ${c.en ? `<div class="en">${c.en}</div>` : ''}
                        <div class="desc">${c.desc}</div>
                        <div class="meta">${(c.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    </a>`;
                }).join('')}
            </div>
        </div>
    `).join('');
}

renderSections('all');

tabsEl.addEventListener('click', e => {
    if (!e.target.classList.contains('tab')) return;
    tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    renderSections(e.target.dataset.id);
});
</script>
</body>
</html>
