<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بطاقة عمل — شيخة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #D4AF37;
    --gold-light: #f0d060;
    --gold-dark: #b8942f;
    --dark: #030712;
    --green: #006c35;
    --gray: #94a3b8;
    --white: #ffffff;
  }

  body {
    font-family: 'Tajawal', Arial, sans-serif;
    background: #e2e8f0;
    color: var(--dark);
    direction: rtl;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20mm;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  h1.page-title {
    font-size: 16pt;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 8mm;
    text-align: center;
  }

  .cards-container {
    display: flex;
    gap: 10mm;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card-wrapper {
    text-align: center;
  }

  .card-label {
    font-size: 9pt;
    color: #6b7280;
    margin-bottom: 3mm;
    font-weight: 700;
  }

  .card {
    width: 90mm;
    height: 55mm;
    border-radius: 3mm;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  /* ===== FRONT ===== */
  .card-front {
    background: linear-gradient(145deg, #faf5e4, #f0d060 30%, #D4AF37 60%, #b8942f);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5mm;
  }

  .card-front::before {
    content: '';
    position: absolute;
    top: -15mm;
    right: -15mm;
    width: 40mm;
    height: 40mm;
    border: 1px solid rgba(3,7,18,0.06);
    border-radius: 50%;
  }

  .card-front::after {
    content: '';
    position: absolute;
    bottom: -10mm;
    left: -10mm;
    width: 30mm;
    height: 30mm;
    border: 1px solid rgba(3,7,18,0.06);
    border-radius: 50%;
  }

  .card-front svg {
    width: 50mm;
    height: auto;
    margin-bottom: 3mm;
    position: relative;
    z-index: 1;
  }

  .card-front .brand-text {
    font-size: 9pt;
    font-weight: 700;
    color: var(--dark);
    text-align: center;
    position: relative;
    z-index: 1;
    line-height: 1.5;
  }

  .card-front .brand-name {
    font-size: 14pt;
    font-weight: 900;
    color: var(--dark);
    letter-spacing: 2px;
    margin-bottom: 1mm;
    position: relative;
    z-index: 1;
  }

  /* ===== BACK ===== */
  .card-back {
    background: var(--dark);
    display: flex;
    flex-direction: column;
    padding: 5mm 6mm 4mm;
    position: relative;
  }

  .card-back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .back-top {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .back-name {
    font-size: 11pt;
    font-weight: 800;
    color: var(--white);
    margin-bottom: 0.5mm;
  }

  .back-title {
    font-size: 7pt;
    font-weight: 500;
    color: var(--gold);
    margin-bottom: 3mm;
  }

  .back-separator {
    width: 15mm;
    height: 0.8px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin-bottom: 2.5mm;
  }

  .back-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1mm 4mm;
  }

  .back-info-item {
    display: flex;
    align-items: center;
    gap: 1.5mm;
    font-size: 6.5pt;
    color: #cbd5e1;
  }

  .back-info-item svg {
    width: 8px;
    height: 8px;
    fill: var(--gold);
    flex-shrink: 0;
  }

  .back-info-item a {
    color: #cbd5e1;
    text-decoration: none;
  }

  .back-logo {
    position: absolute;
    bottom: 4mm;
    left: 5mm;
    z-index: 1;
  }

  .back-logo svg {
    width: 22mm;
    height: auto;
    opacity: 0.5;
  }

  /* ===== PRINT STYLES ===== */
  @media print {
    body {
      background: white;
      padding: 10mm;
    }

    .card {
      box-shadow: none;
      border: 0.5px solid #e5e7eb;
    }

    @page {
      size: A4;
      margin: 10mm;
    }
  }
</style>
</head>
<body>
