<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#B87333;stop-opacity:0.05" />
    </linearGradient>
    <filter id="qrGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- خلفية -->
  <rect width="400" height="400" fill="#030509"/>
  <rect width="400" height="400" fill="url(#qrGrad)"/>

  <!-- إطار خارجي -->
  <rect x="15" y="15" width="370" height="370" rx="20" fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.3"/>
  <rect x="18" y="18" width="364" height="364" rx="18" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.15"/>

  <!-- QR Code شبكة توضيحية (نمط QR حقيقي مبسط) -->
  <g opacity="0.85">
    <!-- زوايا القراءة الثلاث -->
    <!-- الزاوية العلوية اليمنى -->
    <rect x="320" y="20" width="50" height="50" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <rect x="326" y="26" width="38" height="38" fill="#D4AF37"/>
    <rect x="332" y="32" width="26" height="26" fill="none" stroke="#030509" stroke-width="2"/>

    <!-- الزاوية العلوية اليسرى -->
    <rect x="30" y="20" width="50" height="50" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <rect x="36" y="26" width="38" height="38" fill="#D4AF37"/>
    <rect x="42" y="32" width="26" height="26" fill="none" stroke="#030509" stroke-width="2"/>

    <!-- الزاوية السفلية اليمنى -->
    <rect x="320" y="330" width="50" height="50" fill="none" stroke="#D4AF37" stroke-width="2"/>
    <rect x="326" y="336" width="38" height="38" fill="#D4AF37"/>
    <rect x="332" y="342" width="26" height="26" fill="none" stroke="#030509" stroke-width="2"/>

    <!-- خط الفاصل -->
    <line x1="70" y1="30" x2="70" y2="80" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="70" x2="80" y2="70" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>

    <!-- شبكة البيانات -->
    <g opacity="0.7">
      <rect x="100" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="115" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="130" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="145" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="160" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="175" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="190" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="205" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="220" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="235" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="250" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="265" y="100" width="8" height="8" fill="#D4AF37"/>
      <rect x="280" y="100" width="8" height="8" fill="#D4AF37"/>

      <!-- صف ثاني -->
      <rect x="100" y="115" width="8" height="8" fill="#D4AF37"/>
      <rect x="175" y="115" width="8" height="8" fill="#D4AF37"/>
      <rect x="250" y="115" width="8" height="8" fill="#D4AF37"/>
      <rect x="280" y="115" width="8" height="8" fill="#D4AF37"/>

      <!-- نمط عشوائي في الوسط يمثل البيانات -->
      <rect x="130" y="130" width="8" height="8" fill="#D4AF37"/>
      <rect x="150" y="130" width="8" height="8" fill="#D4AF37"/>
      <rect x="170" y="130" width="8" height="8" fill="#D4AF37"/>
      <rect x="190" y="130" width="8" height="8" fill="#D4AF37"/>
      <rect x="210" y="130" width="8" height="8" fill="#D4AF37"/>
      <rect x="230" y="130" width="8" height="8" fill="#D4AF37"/>
      <rect x="250" y="130" width="8" height="8" fill="#D4AF37"/>

      <rect x="115" y="150" width="8" height="8" fill="#D4AF37"/>
      <rect x="140" y="150" width="8" height="8" fill="#D4AF37"/>
      <rect x="165" y="150" width="8" height="8" fill="#D4AF37"/>
      <rect x="200" y="150" width="8" height="8" fill="#D4AF37"/>
      <rect x="220" y="150" width="8" height="8" fill="#D4AF37"/>
      <rect x="240" y="150" width="8" height="8" fill="#D4AF37"/>
      <rect x="260" y="150" width="8" height="8" fill="#D4AF37"/>
    </g>
  </g>

  <!-- شعار شيخة في المركز -->
  <g filter="url(#qrGlow)">
    <circle cx="200" cy="200" r="45" fill="rgba(3,5,9,0.9)" stroke="#D4AF37" stroke-width="2.5"/>
    <circle cx="200" cy="200" r="42" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
    <text x="200" y="210" font-family="Amiri, serif" font-size="42" font-weight="700" fill="#D4AF37" text-anchor="middle" dominant-baseline="central">ش</text>
  </g>

  <!-- نص التحقق -->
  <text x="200" y="365" font-family="Tajawal, sans-serif" font-size="13" font-weight="700" fill="#D4AF37" text-anchor="middle" opacity="0.8">ابحث هويتك الرقمية</text>
</svg>
