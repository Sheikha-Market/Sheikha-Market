<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF9A56;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#B87333;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B5A2B;stop-opacity:1" />
        </linearGradient>
        <filter id="copperGlow">
            <feGaussianBlur stdDeviation="5" />
            <feOffset result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="shadow">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
        </filter>
    </defs>

    <rect width="400" height="300" fill="#030509" />
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
            <stop offset="0%" style="stop-color:rgba(184,115,51,0.12);stop-opacity:1" />
            <stop offset="100%" style="stop-color:rgba(184,115,51,0);stop-opacity:1" />
        </radialGradient>
    </defs>
    <rect width="400" height="300" fill="url(#bgGrad)" />

    <!-- Copper coils -->
    <g filter="url(#shadow)">
        <!-- Back coil -->
        <circle cx="140" cy="140" r="55" fill="url(#copperGrad)" opacity="0.6" />
        <ellipse cx="140" cy="120" rx="50" ry="15" fill="#FF9A56" opacity="0.4" />

        <!-- Front coil -->
        <circle cx="200" cy="160" r="65" fill="url(#copperGrad)" filter="url(#copperGlow)" />
        <ellipse cx="200" cy="135" rx="60" ry="18" fill="#FF9A56" opacity="0.3" />

        <!-- Shine highlights -->
        <circle cx="180" cy="140" r="18" fill="#fff" opacity="0.15" />
        <circle cx="220" cy="150" r="12" fill="#fff" opacity="0.1" />
    </g>

    <!-- Price info -->
    <g filter="url(#shadow)">
        <rect x="260" y="40" width="130" height="60" rx="10" fill="rgba(3,5,9,0.9)"
            stroke="url(#copperGrad)" stroke-width="2" />
        <text x="325" y="60" font-family="Tajawal" font-size="24" font-weight="800" fill="#B87333"
            text-anchor="middle">4.15</text>
        <text x="325" y="80" font-family="inherit" font-size="12" fill="#71717a"
            text-anchor="middle">$/باوند</text>
    </g>

    <!-- Grade badge -->
    <g transform="translate(30, 30)">
        <rect x="-30" y="-20" width="60" height="40" rx="8" fill="rgba(184,115,51,0.15)"
            stroke="url(#copperGrad)" stroke-width="2" />
        <text x="0" y="0" font-family="Tajawal" font-size="14" font-weight="800" fill="#B87333"
            text-anchor="middle" dominant-baseline="central">Grade A</text>
    </g>

    <!-- Certificate -->
    <text x="20" y="295" font-family="Tajawal" font-size="12" font-weight="700" fill="#B87333">معيار
        COMEX | صناعي</text>
</svg>
