<?xml version="1.0" encoding="UTF-8"?>
<!--
    شعار شيخة المُتقَن — الإصدار المُحسَّن V4
    SHEIKHA Premium Emblem — Enhanced V4

    بسم الله الرحمن الرحيم

    ═══ المعنى / The Meaning ═══

    ① النجمة الثمانية (مربعان متقاطعان بزاوية ٤٥°):
       → الإتقان الهندسي الإسلامي الذي زيّن المساجد والقصور
       → الثمانية ترمز إلى أبواب الجنة الثمانية
       → ﴿ الَّذِي أَحْسَنَ كُلَّ شَيْءٍ خَلَقَهُ ﴾ — السجدة ٧

    ② الميزان النبوي (عمود + ذراعان + كفّتان):
       → العدل والقسط في كل معاملة
       → لا غش ولا بخس ولا تطفيف
       → ﴿ وَأَقِيمُوا الْوَزْنَ بِالْقِسْطِ وَلَا تُخْسِرُوا الْمِيزَانَ ﴾ — الرحمن ٩

    ③ الجوهرة الماسية (الشكل الماسي المركزي):
       → المعادن الثمينة — الذهب والفضة والنحاس والحديد
       → ﴿ وَأَنزَلْنَا الْحَدِيدَ فِيهِ بَأْسٌ شَدِيدٌ وَمَنَافِعُ لِلنَّاسِ ﴾ — الحديد ٢٥

    ④ تاج الحكمة (الكرة المضيئة فوق العمود):
       → الحكمة والبصيرة والريادة
       → ﴿ يُؤْتِي الْحِكْمَةَ مَن يَشَاءُ ﴾ — البقرة ٢٦٩

    ⑤ القاعدة الراسخة:
       → الكتاب والسنة — أساس لا يهتز
       → «تركتُ فيكم ما إن تمسّكتم به لن تضلّوا — كتابَ الله وسُنّتي»

    ⑥ حرف الشين (ش):
       → هوية شيخة — أول سوق إسلامي رقمي للمعادن

    ⑦ نقاط البوصلة الأربع:
       → الشمول العالمي — شرق وغرب وشمال وجنوب
       → ﴿ وَمَا أَرْسَلْنَاكَ إِلَّا رَحْمَةً لِّلْعَالَمِينَ ﴾ — الأنبياء ١٠٧

    ⑧ التدرج الذهبي-النحاسي:
       → تنوّع المعادن: ذهب → فضة → نحاس → حديد

    ⑨ الدائرة المحيطة مع ١٢ نقطة:
       → الإحاطة والشمول + أشهر السنة القمرية

    ═══ الخلاصة ═══
    نظامٌ ربّاني + عدلٌ نبوي + معادنُ نفيسة + حكمةٌ عالية + أساسٌ راسخ + شمولٌ عالمي = شيخة

    © جميع الحقوق محفوظة — سلمان أحمد بن سلمان الراجح
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <defs>
        <!-- ═══ التدرجات الذهبية الفاخرة ═══ -->
