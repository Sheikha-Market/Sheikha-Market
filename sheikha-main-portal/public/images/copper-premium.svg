<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <!-- تدرجات نحاسية فاخرة -->
    <radialGradient id="copperShine" cx="40%" cy="30%">
      <stop offset="0%" style="stop-color:#F4C2A0;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#D4906C;stop-opacity:1"/>
      <stop offset="45%" style="stop-color:#B87333;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#9B5E3A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6E3A21;stop-opacity:1"/>
    </radialGradient>

    <linearGradient id="copperReflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCAA;stop-opacity:0.9"/>
      <stop offset="25%" style="stop-color:#D4906C;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#B87333;stop-opacity:1"/>
      <stop offset="75%" style="stop-color:#8B4513;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6E3A21;stop-opacity:1"/>
    </linearGradient>

    <radialGradient id="copperHighlight" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#FFE4CC;stop-opacity:0.7"/>
      <stop offset="40%" style="stop-color:#D4906C;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#B87333;stop-opacity:0"/>
    </radialGradient>

    <filter id="copperGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow3D">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dx="0" dy="20" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- خلفية -->
  <rect width="800" height="800" fill="#0A0E1A"/>

  <!-- وهج خلفي -->
  <circle cx="400" cy="350" r="300" fill="url(#copperHighlight)" opacity="0.12" filter="url(#copperGlow)"/>

  <!-- لفافة نحاس (coil) ثلاثية الأبعاد -->
  <g filter="url(#shadow3D)">
    <!-- اللفافة الخارجية -->
    <ellipse cx="400" cy="400" rx="200" ry="200"
             fill="url(#copperShine)"
             stroke="#D4906C" stroke-width="3"/>

    <!-- الثقب الداخلي -->
    <ellipse cx="400" cy="400" rx="80" ry="80"
             fill="#2A1810"
             stroke="#6E3A21" stroke-width="2"/>

    <!-- خطوط اللفائف -->
    <circle cx="400" cy="400" r="170"
            fill="none" stroke="#9B5E3A" stroke-width="2" opacity="0.6"/>
    <circle cx="400" cy="400" r="140"
            fill="none" stroke="#B87333" stroke-width="2" opacity="0.5"/>
    <circle cx="400" cy="400" r="110"
            fill="none" stroke="#D4906C" stroke-width="2" opacity="0.4"/>

    <!-- انعكاسات ضوئية منحنية -->
    <path d="M 250 350 Q 280 320, 350 300 Q 380 290, 420 295"
          fill="none" stroke="#FFE4CC" stroke-width="25"
          opacity="0.25" stroke-linecap="round"/>
    <path d="M 450 450 Q 480 480, 520 500"
          fill="none" stroke="#FFCCAA" stroke-width="20"
          opacity="0.2" stroke-linecap="round"/>

    <!-- عمق ثلاثي الأبعاد -->
    <ellipse cx="405" cy="405" rx="195" ry="195"
             fill="none"
             stroke="#6E3A21" stroke-width="8" opacity="0.6"/>

    <!-- نقش -->
    <text x="400" y="410"
          font-family="Arial, sans-serif"
          font-size="36"
          font-weight="bold"
          fill="#6E3A21"
          text-anchor="middle"
          opacity="0.5">Cu</text>
    <text x="400" y="445"
          font-family="'Courier New', monospace"
          font-size="16"
          fill="#9B5E3A"
          text-anchor="middle"
          opacity="0.6">99.9%</text>

    <!-- تفاصيل معدنية -->
    <g opacity="0.3">
      <line x1="300" y1="300" x2="320" y2="280" stroke="#FFE4CC" stroke-width="3"/>
      <line x1="500" y1="500" x2="520" y2="520" stroke="#6E3A21" stroke-width="3"/>
    </g>
  </g>

  <!-- وهج نهائي -->
  <ellipse cx="350" cy="340" rx="120" ry="100"
           fill="#FFCCAA" opacity="0.12"
           filter="url(#copperGlow)"/>
</svg>