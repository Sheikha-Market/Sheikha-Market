<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="شعار شيخة">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d060"/>
      <stop offset="0.55" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#006c35"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0
                0 0.85 0 0 0
                0 0 0.25 0 0
                0 0 0 0.35 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="48" y="48" width="416" height="416" rx="120" fill="url(#g2)"/>

  <!-- Frame -->
  <rect x="64" y="64" width="384" height="384" rx="108" fill="none" stroke="url(#g1)" stroke-width="18" opacity="0.9"/>

  <!-- Ingot + chain motif (no letters) -->
  <g filter="url(#softGlow)">
    <!-- top ingot -->
    <path d="M146 206c0-18 14-32 32-32h156c18 0 32 14 32 32v40c0 18-14 32-32 32H178c-18 0-32-14-32-32v-40z"
          fill="url(#g1)" opacity="0.95"/>
    <!-- middle link -->
    <path d="M196 270c0-22 18-40 40-40h40c22 0 40 18 40 40v16c0 22-18 40-40 40h-40c-22 0-40-18-40-40v-16z"
          fill="none" stroke="url(#g1)" stroke-width="18" opacity="0.95"/>
    <!-- bottom ingot -->
    <path d="M166 318c0-16 13-29 29-29h122c16 0 29 13 29 29v20c0 16-13 29-29 29H195c-16 0-29-13-29-29v-20z"
          fill="url(#g1)" opacity="0.85"/>
  </g>

  <!-- Small accent dots -->
  <circle cx="156" cy="156" r="6" fill="#d4af37" opacity="0.6"/>
  <circle cx="356" cy="156" r="6" fill="#006c35" opacity="0.6"/>
  <circle cx="156" cy="356" r="6" fill="#006c35" opacity="0.6"/>
  <circle cx="356" cy="356" r="6" fill="#d4af37" opacity="0.6"/>
</svg>

