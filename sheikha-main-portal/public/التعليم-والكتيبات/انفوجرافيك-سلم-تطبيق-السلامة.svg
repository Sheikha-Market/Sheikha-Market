<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="سلم تطبيق السلامة">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#050511"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="700" y="90" fill="#D4AF37" font-size="44" text-anchor="middle" font-family="Tajawal, Arial">سلم تطبيق السلامة الشاملة</text>

  <g font-family="Tajawal, Arial" font-size="30" fill="#e0e0e0" text-anchor="middle">
    <rect x="250" y="170" width="900" height="90" rx="16" fill="#1f1f2e" stroke="#10b981"/>
    <text x="700" y="225">1) اعتماد السياسة وتحديد المسؤوليات</text>

    <rect x="250" y="290" width="900" height="90" rx="16" fill="#1f1f2e" stroke="#10b981"/>
    <text x="700" y="345">2) تدريب الفرق وتجهيز أدوات السلامة</text>

    <rect x="250" y="410" width="900" height="90" rx="16" fill="#1f1f2e" stroke="#f59e0b"/>
    <text x="700" y="465">3) تنفيذ الفحوصات اليومية وتوثيق النتائج</text>

    <rect x="250" y="530" width="900" height="90" rx="16" fill="#1f1f2e" stroke="#f59e0b"/>
    <text x="700" y="585">4) التحقق من الامتثال ومعالجة الفجوات</text>

    <rect x="250" y="650" width="900" height="90" rx="16" fill="#1f1f2e" stroke="#10b981"/>
    <text x="700" y="705">5) تحسين مستمر واعتماد الدروس المستفادة</text>
  </g>

  <text x="700" y="830" fill="#B87333" font-size="28" text-anchor="middle" font-family="Tajawal, Arial">منهج تشغيلي: لا ضرر ولا ضرار — إتقان — توثيق</text>
</svg>
