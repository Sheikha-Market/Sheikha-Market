<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>حملة اختبار شاملة | شيخة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Tajawal',sans-serif;direction:rtl;background:#006c35}
.frame{
  position:relative;width:100%;height:100%;
  background:linear-gradient(145deg,#006c35 0%,#006c35ee 60%,#000a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;
}
.geo-bg{
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,164,44,.06) 40px, rgba(201,164,44,.06) 41px),
    repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(201,164,44,.04) 40px, rgba(201,164,44,.04) 41px);
}
.corner{position:absolute;width:80px;height:80px;border-color:#c9a42c}
.tl{top:20px;right:20px;border-top:3px solid;border-right:3px solid}
.tr{top:20px;left:20px;border-top:3px solid;border-left:3px solid}
.bl{bottom:20px;right:20px;border-bottom:3px solid;border-right:3px solid}
.br{bottom:20px;left:20px;border-bottom:3px solid;border-left:3px solid}
.badge{
  background:rgba(201,164,44,.15);
  border:1.5px solid #c9a42c;
  border-radius:50px;
  padding:8px 24px;
  font-size:22px;
  color:#c9a42c;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:30px;
}
.main-title{
  font-size:78px;
  font-weight:900;
  color:#faf7f0;
  text-align:center;
  line-height:1.3;
  margin-bottom:20px;
  text-shadow:0 2px 20px rgba(0,0,0,.4);
}
.subtitle{
  font-size:38px;
  color:rgba(250,247,240,.8);
  text-align:center;
  line-height:1.5;
  margin-bottom:40px;
  max-width:80%;
}
.divider{
  width:120px;height:3px;
  background:linear-gradient(90deg,transparent,#c9a42c,transparent);
  margin:20px auto;
}
.star-row{display:flex;gap:12px;justify-content:center;margin-bottom:30px;font-size:30px}
.data-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
  width:100%;max-width:960px;margin-top:20px
}
.data-box{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(201,164,44,.3);
  border-radius:12px;padding:16px;text-align:center;
}
.data-label{font-size:26px;color:#c9a42c;font-weight:700}
.data-value{font-size:34px;color:#faf7f0;font-weight:900;margin-top:4px}
.brand-mark{
  position:absolute;bottom:25px;
  display:flex;align-items:center;gap:12px;
}
.brand-logo{
  font-size:36px;font-weight:900;
  background:linear-gradient(135deg,#c9a42c,#f0d060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-url{font-size:22px;color:rgba(250,247,240,.6)}
.event-ribbon{
  position:absolute;top:0;left:0;right:0;
  background:linear-gradient(90deg,#c9a42c,#f0d060,#c9a42c);
  color:#000;font-weight:900;text-align:center;
  font-size:26px;padding:8px;
}
.smi-row{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.smi-item{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(201,164,44,.4);
  border-radius:10px;padding:12px 20px;text-align:center;
}
.smi-metal{font-size:24px;color:#c9a42c;font-weight:700}
.smi-price{font-size:34px;color:#faf7f0;font-weight:900}
.smi-change{font-size:19px}
.up{color:#4ade80}.down{color:#f87171}
</style></head>
<body>
<div class="frame">
  <div class="geo-bg"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  
  <div class="badge">✦ منظومة شيخة الذكية ✦</div>
  <div class="main-title">حملة اختبار شاملة</div>
  
  <div class="divider"></div>
  <div class="star-row">✦ ✦ ✦ ✦ ✦</div>
  
  
  <div class="brand-mark">
    <div class="brand-logo">شيخة</div>
    <div class="brand-url">sheikha.top</div>
  </div>
</div>
</body></html>
