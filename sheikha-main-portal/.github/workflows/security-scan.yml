# ╔══════════════════════════════════════════════════════════╗
# ║   🛡️  SHEIKHA SECURITY SCAN — فحص أمني تلقائي          ║
# ║   «لا ضرر ولا ضرار»                                    ║
# ╚══════════════════════════════════════════════════════════╝
name: 🛡️ Sheikha Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'sheikha-main-portal/**'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'   # يومياً منتصف الليل UTC (3 ص بتوقيت الرياض)
  workflow_dispatch:

# صلاحيات محدودة بالحد الأدنى — least-privilege
permissions:
  contents: read
  security-events: write   # مطلوب لرفع نتائج CodeQL إلى Security tab

jobs:

  # ─────────────────────────────────────────────────────────
  # 1️⃣  فحص ثغرات المتطلبات
  # ─────────────────────────────────────────────────────────
  dependency-audit:
    name: 📦 npm Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sheikha-main-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sheikha-main-portal/package-lock.json
      - name: Install (no scripts — أمان ضد الكود الخبيث)
        run: npm ci --ignore-scripts
      - name: 🛡️ npm audit — مستوى moderate أو أعلى
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: Save JSON report
        if: always()
        run: npm audit --json > audit-report.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: sheikha-main-portal/audit-report.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # 2️⃣  فحص الملفات الحساسة والنسخ الاحتياطية
  # ─────────────────────────────────────────────────────────
  sensitive-files-check:
    name: 📋 Sensitive Files Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Check backup files NOT tracked in git
        run: |
          BACKUPS=$(git ls-files \
            'sheikha-main-portal/server.js.backup*' \
            'sheikha-main-portal/server.js.clean' \
            'sheikha-main-portal/server.js.temp' \
            'sheikha-main-portal/server.js.broken*' \
            '**/*.backup' '**/*.backup-*' 2>/dev/null || true)
          if [[ -n "$BACKUPS" ]]; then
            echo "🔴 CRITICAL: Backup files tracked in git:"
            echo "$BACKUPS"
            exit 1
          else
            echo "✅ No backup files exposed in git"
          fi
      - name: 🔍 Check no .env files in git
        run: |
          ENV_FILES=$(git ls-files '**/.env' '**/.env.production' '**/.env.local' 2>/dev/null || true)
          if [[ -n "$ENV_FILES" ]]; then
            echo "🔴 CRITICAL: .env files in git:"
            echo "$ENV_FILES"
            exit 1
          else
            echo "✅ No .env files in repository"
          fi
      - name: 🔍 Check no credential/key files in git
        run: |
          CREDS=$(git ls-files '**/*.pem' '**/*.key' '**/*.p12' '**/*.pfx' \
                               '**/credentials.json' '**/.npmrc' 2>/dev/null || true)
          if [[ -n "$CREDS" ]]; then
            echo "🔴 CRITICAL: Credential/key files tracked in git:"
            echo "$CREDS"
            exit 1
          else
            echo "✅ No credential files exposed in git"
          fi

  # ─────────────────────────────────────────────────────────
  # 3️⃣  فحص الأسرار المسرَّبة (Secrets Scanning)
  # ─────────────────────────────────────────────────────────
  secrets-scan:
    name: 🔑 Secrets Leak Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # تاريخ كامل للفحص الشامل
      - name: 🔑 Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────────────────
  # 4️⃣  فحص SAST بـ CodeQL
  # ─────────────────────────────────────────────────────────
  codeql-analysis:
    name: 🔬 CodeQL Static Analysis (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ─────────────────────────────────────────────────────────
  # 5️⃣  ملخص الفحوصات الأمنية
  # ─────────────────────────────────────────────────────────
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, sensitive-files-check, secrets-scan, codeql-analysis]
    if: always()
    permissions:
      contents: read
    steps:
      - name: 📊 Write Summary
        run: |
          echo "## 🛡️ Sheikha Security Report" >> $GITHUB_STEP_SUMMARY
          echo "**﴿ وَاللَّهُ غَالِبٌ عَلَىٰ أَمْرِهِ ﴾**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | الفحص | النتيجة |" >> $GITHUB_STEP_SUMMARY
          echo "|---|-------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | 📦 npm audit (moderate+) | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | 📋 Sensitive files check  | ${{ needs.sensitive-files-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | 🔑 Gitleaks secrets scan  | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | 🔬 CodeQL SAST            | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_«لا ضرر ولا ضرار» — منظمة شيخة™_" >> $GITHUB_STEP_SUMMARY
