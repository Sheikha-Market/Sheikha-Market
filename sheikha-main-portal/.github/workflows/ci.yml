name: 🌟 Sheikha CI — Quality & Excellence

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# صلاحيات محدودة — least-privilege
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  # ─────────────────────────────────────────────────────────
  # 1️⃣  الجودة — Lint + Tests + Coverage
  # ─────────────────────────────────────────────────────────
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        working-directory: sheikha-main-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sheikha-main-portal/package-lock.json
      - name: Install (no scripts)
        run: npm ci --ignore-scripts
      - name: 🔍 Lint
        run: npm run lint --if-present
      - name: 🧪 Unit Tests
        run: npm test --if-present
      - name: 🏗️ Build
        run: npm run build --if-present

  # ─────────────────────────────────────────────────────────
  # 2️⃣  الأمان — Security Audit
  # ─────────────────────────────────────────────────────────
  security-audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sheikha-main-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sheikha-main-portal/package-lock.json
      - name: Install (no scripts)
        run: npm ci --ignore-scripts
      - name: 🛡️ Security Audit (moderate+)
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: 🔑 Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────────────────
  # 3️⃣  SBOM — Software Bill of Materials
  # ─────────────────────────────────────────────────────────
  sbom:
    name: 📦 SBOM Generation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sheikha-main-portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sheikha-main-portal/package-lock.json
      - name: Install (no scripts)
        run: npm ci --ignore-scripts
      - name: 📦 Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sheikha-sbom
          path: sheikha-main-portal/sbom.cdx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────
  # 4️⃣  Docker — بناء وتدخين الصورة
  # ─────────────────────────────────────────────────────────
  docker-smoke:
    name: 🐳 Docker Build Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: sheikha-main-portal
    steps:
      - uses: actions/checkout@v4
      - name: 🐳 Docker Build
        run: docker build -t sheikha-enterprise-portal:ci .

  # ─────────────────────────────────────────────────────────
  # 5️⃣  ملخص الجودة الشاملة
  # ─────────────────────────────────────────────────────────
  excellence-summary:
    name: 🌟 Excellence Summary
    runs-on: ubuntu-latest
    needs: [quality, security-audit, sbom, docker-smoke]
    if: always()
    permissions:
      contents: read
    steps:
      - name: 🌟 Write Excellence Summary
        run: |
          echo "## 🌟 Sheikha Excellence Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**﴿ إِنَّ اللَّهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَن يُتْقِنَهُ ﴾**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | الفحص | النتيجة |" >> $GITHUB_STEP_SUMMARY
          echo "|---|-------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | 🔍 Code Quality (Lint + Tests) | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | 🛡️ Security Audit + Gitleaks  | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | 📦 SBOM Generation            | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | 🐳 Docker Build               | ${{ needs.docker-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_«لا ضرر ولا ضرار» — الأفضل في الكون والدنيا 🤍_" >> $GITHUB_STEP_SUMMARY
