name: Sheikha CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sheikha-main-portal/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sheikha-main-portal

      - name: Lint
        run: npm run lint --if-present
        working-directory: sheikha-main-portal

      - name: Unit tests
        run: npm test --if-present
        working-directory: sheikha-main-portal

      - name: Security audit
        run: npm audit --audit-level=high
        working-directory: sheikha-main-portal

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build --if-present
        working-directory: sheikha-main-portal

      - name: Install osv-scanner
        run: |
          curl -sSfL https://raw.githubusercontent.com/google/osv-scanner/main/install.sh | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run osv-scanner
        run: osv-scanner -r sheikha-main-portal

      - name: Run Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default
          generateSarif: "0"

      - name: Generate SBOM (CycloneDX)
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json
        working-directory: sheikha-main-portal

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sheikha-sbom
          path: sheikha-main-portal/sbom.cdx.json

      - name: Docker build smoke (no push)
        run: docker build -t sheikha-main-portal:ci ./sheikha-main-portal
