apiVersion: types.kubefed.io/v1beta1
kind: FederatedNamespace
metadata:
  name: sheikha-cloud-system
  namespace: sheikha-cloud-system
spec:
  placement:
    clusterSelector:
      matchLabels:
        sheikha.io/sovereign: "true"
---
# Sheikha Cloud — Kubernetes Multi-Cluster Federation
# Manages workload placement across all sovereign regions
apiVersion: core.kubefed.io/v1beta1
kind: KubeFedCluster
metadata:
  name: cluster-riyadh
  namespace: kube-federation-system
  labels:
    sheikha.io/region: ruh-riyadh
    sheikha.io/tier: primary
    sheikha.io/sovereign: "true"
    sheikha.io/country: SA
spec:
  apiEndpoint: "https://k8s.ruh.sheikha.cloud:6443"
  caBundle: "" # injected via Vault
  secretRef:
    name: cluster-riyadh-secret
---
