---
# Global federated deployment for Sheikha API Gateway
apiVersion: types.kubefed.io/v1beta1
kind: FederatedDeployment
metadata:
  name: sheikha-api-gateway
  namespace: sheikha-cloud-system
spec:
  template:
    metadata:
      labels:
        app: sheikha-api-gateway
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: sheikha-api-gateway
      template:
        metadata:
          labels:
            app: sheikha-api-gateway
        spec:
          containers:
            - name: gateway
              image: sheikha/api-gateway:latest
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "2"
                  memory: "2Gi"
  placement:
    clusters:
      - name: cluster-riyadh
      - name: cluster-istanbul
      - name: cluster-cairo
      - name: cluster-kualalumpur
  overrides:
    - clusterName: cluster-riyadh
      clusterOverrides:
        - path: "/spec/replicas"
          value: 5
    - clusterName: cluster-istanbul
      clusterOverrides:
        - path: "/spec/replicas"
          value: 4
