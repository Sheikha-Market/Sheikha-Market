global:
  resolve_timeout: 5m

route:
  receiver: default-log
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical-log

receivers:
  - name: default-log
    # Configure email/Slack/webhook in production.
    # Left intentionally minimal to avoid secret leakage in repository.

  - name: critical-log
    # Configure email/Slack/webhook in production.
