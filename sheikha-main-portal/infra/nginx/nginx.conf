# ═══════════════════════════════════════════════════════════════════════════════
# 🏪 سوق شيخة — إعدادات Nginx
# Sheikha Market — Nginx Virtual Host Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# النطاقات:
#   public.sheikha.top  ← البوابة العامة (جميع الطلبات → main-portal:8080)
#   admin.sheikha.top   ← لوحة الإدارة  (مسارات /admin/** فقط → main-portal:8080)
#
# ملاحظة: يعمل هذا الملف داخل حاوية Docker؛ الخادم الخلفي على الشبكة الداخلية
# ═══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── تنسيق السجلات ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" host=$host';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ─── الخادم الخلفي: main-portal ────────────────────────────────────────────
    upstream main_portal {
        server main-portal:8080;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # 🌐 public.sheikha.top — البوابة العامة
    # يقبل جميع الطلبات ويوجّهها للخادم الرئيسي
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name public.sheikha.top;

        # Health check لـ nginx نفسه
        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # توجيه كل الطلبات للخادم الرئيسي
        location / {
            proxy_pass         http://main_portal;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # مهلة الطلب
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # ترويسات الأمان
            add_header X-Frame-Options        "SAMEORIGIN"  always;
            add_header X-Content-Type-Options "nosniff"     always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # 🔒 admin.sheikha.top — لوحة الإدارة
    # يوجّه جميع الطلبات للخادم الرئيسي مع إضافة ترويسة X-Sheikha-Admin.
    # تحقق المصادقة الفعلي يتولاه تطبيق Node.js (middleware الإدارة).
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name admin.sheikha.top;

        # Health check لـ nginx نفسه
        location = /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # توجيه جميع الطلبات للخادم الرئيسي
        # المصادقة والتحقق من الصلاحيات يتوليان بواسطة Node.js middleware
        location / {
            proxy_pass         http://main_portal;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Sheikha-Admin   "true";
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # ترويسات أمان إضافية للوحة الإدارة
            add_header X-Frame-Options        "DENY"    always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control          "no-store" always;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # ↩️ الخادم الافتراضي — رفض أي طلب لنطاق غير معروف
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
