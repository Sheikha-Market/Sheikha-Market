# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  ✅ PR Validation — التحقق الشامل من Pull Requests                          ║
# ║  Sheikha Market — Automated PR Quality Gate                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: PR — Validation & Quality Gate

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

jobs:
  # ─── التحقق من عنوان الـ PR ────────────────────────────────────────────────
  pr-title:
    name: 📋 Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read

    steps:
      - name: ✅ Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR Title: $PR_TITLE"
          # التحقق من أن العنوان ليس فارغاً ولا أقل من 10 حروف
          if [ ${#PR_TITLE} -lt 10 ]; then
            echo "❌ عنوان الـ PR قصير جداً — يجب أن يكون 10 حروف على الأقل"
            exit 1
          fi
          echo "✅ عنوان الـ PR صالح"

  # ─── التحقق من الكود ───────────────────────────────────────────────────────
  code-check:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟩 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: sheikha-main-portal/.nvmrc
          cache: npm
          cache-dependency-path: sheikha-main-portal/package-lock.json

      - name: 📦 Install dependencies
        working-directory: sheikha-main-portal
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline
          else
            npm install --prefer-offline
          fi

      - name: 🔒 Security audit
        working-directory: sheikha-main-portal
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: ✅ Lint check
        working-directory: sheikha-main-portal
        run: |
          if npm run lint --if-present 2>/dev/null; then
            echo "✅ Lint passed"
          else
            echo "ℹ️ No lint script — skipping"
          fi

      - name: 🧪 Syntax check — core files
        working-directory: sheikha-main-portal
        run: |
          echo "فحص صياغة الملفات المتغيرة..."
          # فحص جميع ملفات JS الرئيسية
          find . -name "*.js" \
            -not -path "*/node_modules/*" \
            -not -path "*/public/*" \
            -not -name "*.backup*" \
            -not -name "*.temp*" \
            | head -50 \
            | while read f; do
              node --check "$f" && echo "✅ $f" || { echo "❌ $f"; exit 1; }
            done
          echo "✅ فحص الصياغة اكتمل بنجاح"

      - name: 🧠 Neural Network integrity check
        working-directory: sheikha-main-portal
        run: |
          node -e "
            const cells = require('./core/neural/neural-cells');
            const s = cells.status();
            if (!s.ready || s.totalCells !== 12) {
              console.error('❌ Neural cells check failed:', s);
              process.exit(1);
            }
            console.log('✅ 12 خلية عصبية — سليمة');
          "

  # ─── ملخص ─────────────────────────────────────────────────────────────────
  summary:
    name: 📊 PR Summary
    runs-on: ubuntu-latest
    needs: [pr-title, code-check]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: 📊 Comment PR Summary
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            const titleCheck = '${{ needs.pr-title.result }}';
            const codeCheck = '${{ needs.code-check.result }}';
            
            const emoji = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            
            const body = `## 📊 تقرير مراجعة الـ PR — PR Review Report

            | الفحص | النتيجة |
            |-------|---------|
            | 📋 عنوان الـ PR | ${emoji(titleCheck)} |
            | 🔍 جودة الكود | ${emoji(codeCheck)} |

            ${(titleCheck === 'success' && codeCheck === 'success') ? 
              '### ✅ الـ PR جاهز للمراجعة — PR is ready for review\n\n*«إِنَّ اللَّهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ»*' :
              '### ⚠️ يحتاج الـ PR إصلاحات قبل المراجعة — PR needs fixes before review'}
            `;

            // البحث عن تعليق سابق وتحديثه
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const botComment = comments.data.find(c => 
              c.user.type === 'Bot' && c.body.includes('تقرير مراجعة الـ PR')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
