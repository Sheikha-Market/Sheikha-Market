# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔔 Notifications & Greetings — الترحيب بالمساهمين الجدد                  ║
# ║  Sheikha Market — First-Time Contributor Welcome                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: Greet — First-Time Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greet:
    name: 👋 Welcome New Contributors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 👋 First-time issue greeting
        if: github.event_name == 'issues'
        uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            ## 🕌 أهلاً وسهلاً بك في سوق شيخة™ — Welcome!

            شكراً لفتح هذا الـ Issue! 🙏

            **للتسريع في المعالجة:**
            - ✅ تأكد من ملء جميع حقول القالب
            - 🔒 إذا كانت مشكلة أمنية، أبلغ عبر [GitHub Security Advisories](../../security/advisories/new)
            - 💬 للنقاشات العامة، استخدم [قسم النقاشات](../../discussions)

            سنراجع هذا الـ Issue في أقرب وقت ممكن بإذن الله.

            ---
            *﴿وَتَعَاوَنُوا عَلَى الْبِرِّ وَالتَّقْوَىٰ﴾ — المائدة: ٢*
            *منظومة شيخة™ — السوق الذكي المتكامل*

      - name: 👋 First-time PR greeting
        if: github.event_name == 'pull_request_target'
        uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            ## 🕌 أهلاً وسهلاً بمساهمتك في سوق شيخة™ — Welcome!

            شكراً على هذا الـ Pull Request! 🙏

            **قائمة التحقق قبل المراجعة:**
            - [ ] تأكد من اجتياز جميع فحوصات CI
            - [ ] راجع [ميثاق شيخة](../../blob/main/CHARTER.md) للتوافق الشرعي
            - [ ] أضف وصفاً واضحاً للتغييرات
            - [ ] تأكد من أن الكود لا يحتوي على credentials أو secrets

            سنراجع مساهمتك في أقرب وقت ممكن بإذن الله.

            ---
            *«إِنَّ اللَّهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ»*
            *منظومة شيخة™ — السوق الذكي المتكامل*
