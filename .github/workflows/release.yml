# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🚀 Release Automation — إصدار تلقائي منظّم                                ║
# ║  Sheikha Market — Automated Release & Changelog                             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: Release — Automated

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: "رقم الإصدار (مثال: v1.2.0)"
        required: true
        type: string
      prerelease:
        description: "هل هذا إصدار تجريبي؟"
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: 📦 Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      discussions: write

    steps:
      - name: 📥 Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🟩 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: sheikha-main-portal/.nvmrc
          cache: npm
          cache-dependency-path: sheikha-main-portal/package-lock.json

      - name: 📦 Install dependencies
        working-directory: sheikha-main-portal
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline
          else
            npm install --prefer-offline
          fi

      - name: 🏷️ Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            # تحقق إذا كان الـ tag يحتوي على - (مثل v1.0.0-beta)
            if echo "${GITHUB_REF#refs/tags/}" | grep -q '-'; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: 📝 Generate Release Notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          
          echo "## 🕌 سوق شيخة — الإصدار ${TAG}" > release_notes.md
          echo "" >> release_notes.md
          echo "> بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ" >> release_notes.md
          echo "" >> release_notes.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "### 📋 التغييرات منذ ${PREV_TAG}" >> release_notes.md
            echo "" >> release_notes.md
            git log "${PREV_TAG}..${TAG}" \
              --pretty=format:"- %s (%h)" \
              --no-merges \
              -- sheikha-main-portal/ \
              >> release_notes.md || true
          else
            echo "### 🎉 الإصدار الأول" >> release_notes.md
            echo "" >> release_notes.md
            echo "أول إصدار رسمي من سوق شيخة™" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*«إِنَّ اللَّهَ يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ»*" >> release_notes.md
          
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "🕌 سوق شيخة ${{ steps.version.outputs.tag }}"
          body_path: release_notes.md
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: false
          make_latest: ${{ steps.version.outputs.prerelease != 'true' }}
          files: |
            sheikha-main-portal/package.json
            CHARTER.md
            README.md
