# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🏷️ PR Auto-Labeler — تصنيف تلقائي لـ Pull Requests                       ║
# ║  Sheikha Market — Smart PR Labeling                                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: Labeler — Auto PR Labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: 🏷️ Auto-Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🏷️ Apply labels based on changed files
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false
